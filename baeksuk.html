<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>장수한우곱창 - 백석점</title>
  <style>
    /* 사장님이 선호하시는 다크 테마 및 깔끔한 스타일 (기존 스타일 유지) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
    :root { --bg: #0a0a0a; --card: #1a1a1a; --text: #fff; --red: #dc2626; --blue: #3b82f6; --dim: #888; }
    body { background: var(--bg); color: var(--text); padding-bottom: 30px; }
    .header { padding: 30px 20px; text-align: center; background: var(--card); border-bottom: 1px solid #333; }
    .summary-card { margin: 20px; padding: 30px; background: linear-gradient(135deg, var(--red), #800); border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .item { background: var(--card); margin: 10px 20px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; cursor: pointer; }
    .detail-box { display: none; background: #111; margin: -10px 20px 10px; padding: 15px 20px; border-radius: 0 0 15px 15px; border: 1px solid #222; border-top: none; }
    .active .detail-box { display: block; }
    .loading { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="loader" class="loading"><div class="spinner"></div><p style="margin-top:20px; font-size:14px;">백석점 장부 연결 중...</p></div>

  <div class="header">
    <h2 style="color: var(--red); font-weight: 900;">📍 장수한우 백석점</h2>
    <div style="margin-top:15px;">
      <select id="year" onchange="loadData()" style="padding:8px; border-radius:8px; background:#333; color:white; border:none;">
        <option value="2026" selected>2026년</option>
        <option value="2025">2025년</option>
      </select>
      <select id="month" onchange="loadData()" style="padding:8px; border-radius:8px; background:#333; color:white; border:none;">
        <option value="1">1월</option><option value="2">2월</option><option value="3" selected>3월</option>
      </select>
    </div>
  </div>

  <div class="summary-card">
    <p style="font-size:13px; opacity:0.8; font-weight:bold;">이번 달 정산 순이익</p>
    <h1 id="totalProfit" style="font-size:36px; margin:10px 0; font-weight:900;">- 원</h1>
    <p id="baseDate" style="font-size:12px; opacity:0.6;">데이터 확인 중...</p>
  </div>

  <div id="pnlList"></div>

  <script>
    const CONFIG = {
      // 🚨 사장님: 구글에서 배포한 [새 웹 앱 URL]을 여기에 넣으세요!
      url: 'https://script.google.com/macros/s/AKfycby8JIFlUFJrGY7swJ9rHi79Iu5i2Qqq6gZy80WsrGNAHnx2ebctUVG0j8R17-vrmabY/exec',
      token: '940216',
      branch: '백석점'
    };

    async function loadData() {
      const loader = document.getElementById('loader');
      const year = document.getElementById('year').value;
      const month = document.getElementById('month').value;
      loader.classList.remove('hidden');

      try {
        // GET 방식으로 호출하여 CORS 이슈 해결
        const res = await fetch(`${CONFIG.url}?token=${CONFIG.token}&branch=${CONFIG.branch}&year=${year}&month=${month}&action=getProfitLoss`);
        const data = await res.json();

        if (data.success) {
          render(data);
        } else {
          alert("오류: " + data.message);
        }
      } catch (e) {
        console.error(e);
        alert("서버 연결 실패! 배포 주소와 인터넷을 확인하세요.");
      } finally {
        loader.classList.add('hidden');
      }
    }

    function render(data) {
      // 키워드 포함 기반의 지능형 데이터 추출
      const getV = (k) => data.pnlData.find(i => i.label.includes(k))?.value || 0;
      
      document.getElementById('totalProfit').innerText = getV("순이익").toLocaleString() + "원";
      document.getElementById('baseDate').innerText = data.latestDay !== "-" ? `${data.latestDay}일 영업 종료 기준 리포트` : "정산 데이터 집계 중";

      const list = document.getElementById('pnlList');
      list.innerHTML = "";
      
      const categories = [
        { l: "1. 총 매출액", v: getV("매출액"), c: "var(--blue)" },
        { l: "2. 매출원가(COGS)", v: getV("매출원가"), c: "var(--red)" },
        { l: "3. 매출이익", v: getV("매출이익"), c: "var(--blue)" },
        { l: "4. 인건비", v: getV("인건비"), c: "var(--red)" },
        { l: "5. 최종 순이익", v: getV("순이익"), c: "var(--blue)" }
      ];

      categories.forEach(item => {
        list.innerHTML += `
          <div class="item">
            <span style="font-size:14px; font-weight:bold; color:var(--dim);">${item.l}</span>
            <span style="font-size:16px; font-weight:900; color:${item.c};">${item.v.toLocaleString()}원</span>
          </div>`;
      });
    }

    window.onload = loadData;
  </script>
</body>
</html>

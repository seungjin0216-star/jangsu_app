  <title>장수한우곱창 백석점</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #2d3238;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 40px;
    }
    
    /* 로딩 화면 - 재미있는 애니메이션 */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #2d3238 0%, #1a1d24 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
    }
    
    .calculator {
      width: 120px;
      height: 160px;
      background: #3a3f47;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      position: relative;
      animation: calculator-bounce 2s ease-in-out infinite;
    }
    
    @keyframes calculator-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .calc-screen {
      width: 100%;
      height: 40px;
      background: #1f2329;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #c9a055;
      animation: numbers-change 1.5s infinite;
    }
    
    @keyframes numbers-change {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .calc-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    
    .calc-btn {
      aspect-ratio: 1;
      background: #2d3238;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #8b8b8b;
      font-weight: 600;
    }
    
    .calc-btn.active {
      background: #c9a055;
      color: #2d3238;
      animation: button-press 0.3s ease-out;
    }
    
    @keyframes button-press {
      0% { transform: scale(1); }
      50% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    
    .money-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    
    .money {
      position: absolute;
      font-size: 32px;
      animation: money-float 3s ease-in-out infinite;
      opacity: 0.6;
    }
    
    .money:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .money:nth-child(2) { right: 15%; top: 30%; animation-delay: 0.5s; }
    .money:nth-child(3) { left: 20%; bottom: 25%; animation-delay: 1s; }
    .money:nth-child(4) { right: 10%; bottom: 35%; animation-delay: 1.5s; }
    .money:nth-child(5) { left: 50%; top: 15%; animation-delay: 0.7s; }
    
    @keyframes money-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-30px) rotate(10deg); }
      50% { transform: translateY(-60px) rotate(-10deg); }
      75% { transform: translateY(-30px) rotate(5deg); }
    }
    
    .loading-text {
      margin-top: 32px;
      color: #c9a055;
      font-size: 16px;
      font-weight: 600;
      animation: text-pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes text-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* 로그인 화면 */
    .login-container {
      display: none;
      position: fixed;
      inset: 0;
      background: #2d3238;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }
    
    .login-box {
      background: #3a3f47;
      padding: 40px 32px;
      border-radius: 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    
    .login-logo { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 22px; font-weight: 700; color: #c9a055; margin-bottom: 6px; }
    .login-subtitle { color: #8b8b8b; font-size: 14px; margin-bottom: 32px; }
    
    .login-input {
      width: 100%;
      padding: 14px 18px;
      background: #2d3238;
      border: 2px solid #c9a055;
      border-radius: 12px;
      color: #ffffff;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    
    .login-input:focus { outline: none; border-color: #d4af6a; }
    .login-btn { width: 100%; padding: 14px; background: #c9a055; border: none; border-radius: 12px; color: #2d3238; font-size: 16px; font-weight: 700; cursor: pointer; }
    .error-message { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
    
    /* 헤더 */
    .header {
      background: #2d3238;
      padding: 16px 20px;
      text-align: center;
      border-bottom: 1px solid #3a3f47;
    }
    
    .header-logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #c9a055;
    }
    
    .header-logo::before { content: '🥩'; font-size: 22px; }
    
    /* 날짜 바 */
    .date-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #2d3238;
      border-bottom: 1px solid #3a3f47;
    }
    
    .date-label { font-size: 16px; font-weight: 600; color: #ffffff; }
    .date-selectors { display: flex; gap: 8px; }
    
    .date-select {
      padding: 8px 16px;
      background: #3a3f47;
      border: 1px solid #c9a055;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .date-select:focus { outline: none; border-color: #d4af6a; }
    
    /* 메인 카드 */
    .main-card { margin: 16px 20px; padding: 0; position: relative; }
    
    .main-card-inner {
      padding: 20px 18px;
      background: linear-gradient(135deg, #8b3a3a 0%, #6d2e2e 100%);
      border-radius: 20px;
      border: 3px solid #c9a055;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
    
    .main-card-inner::after {
      content: '💵';
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 60px;
      opacity: 0.15;
      transform: rotate(15deg);
    }
    
    .card-label { font-size: 13px; color: rgba(255, 255, 255, 0.9); margin-bottom: 6px; font-weight: 500; position: relative; z-index: 1; }
    .card-value { font-size: 30px; font-weight: 700; color: #ffffff; margin-bottom: 6px; letter-spacing: -0.5px; position: relative; z-index: 1; }
    .card-change { font-size: 13px; color: rgba(255, 255, 255, 0.9); font-weight: 600; position: relative; z-index: 1; }
    .card-change .green { color: #6dd47e; }
    .card-change .red { color: #ff6b6b; }
    
    /* 손익계산서 타이틀 */
    .section-header { padding: 12px 20px 0 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: #ffffff; margin-bottom: 10px; }
    .section-divider { height: 2px; background: linear-gradient(to right, #e85d4f 50%, #3a3f47 50%); margin-bottom: 16px; }
    
    /* 차트 영역 */
    .charts-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 20px 16px 20px;
    }
    
    /* 파이 차트 */
    .pie-chart-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }
    
    .pie-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .pie-center-label { font-size: 10px; color: #8b8b8b; margin-bottom: 2px; }
    .pie-center-value { font-size: 20px; font-weight: 700; color: #ffffff; }
    
    #pieChart { width: 100%; height: 100%; }
    
    /* 비율 분석 리스트 */
    .ratio-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .ratio-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ratio-color {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    
    .ratio-label {
      font-size: 11px;
      color: #ffffff;
      font-weight: 600;
      flex: 1;
    }
    
    .ratio-value {
      font-size: 11px;
      color: #c9a055;
      font-weight: 700;
    }
    
    /* 계정 그리드 */
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 20px 20px 20px;
    }
    
    .account-card {
      background: #454c56;
      border-radius: 12px;
      padding: 12px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .account-card:active {
      background: #4f5660;
    }
    
    .account-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .account-icon {
      width: 32px;
      height: 32px;
      background: rgba(201, 160, 85, 0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .account-icon svg {
      width: 18px;
      height: 18px;
      stroke: #c9a055;
    }
    
    .account-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .account-label {
      font-size: 11px;
      color: #b8bec7;
      font-weight: 700;
    }
    
    .account-value {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    
    .account-value.positive { color: #3b82f6; }
    .account-value.negative { color: #ef4444; }
    
    .account-chevron {
      width: 20px;
      height: 20px;
      color: #6b7280;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    
    .account-card.expanded .account-chevron {
      transform: rotate(180deg);
    }
    
    .account-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-top: 0;
    }
    
    .account-details.expanded {
      max-height: 500px;
      margin-top: 12px;
    }
    
    .detail-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      margin-bottom: 4px;
    }
    
    .detail-item:last-child {
      margin-bottom: 0;
    }
    
    .detail-label {
      font-size: 11px;
      color: #b8bec7;
      font-weight: 700;
    }
    
    .detail-value {
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    
    .detail-value.positive { color: #3b82f6; }
    .detail-value.negative { color: #ef4444; }
    
    .hidden { display: none !important; }
  </style>

      operating: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0115.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5v.75A.75.75 0 013 6h-.75m0 0v-.375c0-.621.504-1.125 1.125-1.125H20.25M2.25 6v9m18-10.5v.75c0 .414.336.75.75.75h.75m-1.5-1.5h.375c.621 0 1.125.504 1.125 1.125v9.75c0 .621-.504 1.125-1.125 1.125h-.375m1.5-1.5H21a.75.75 0 00-.75.75v.75m0 0H3.75m0 0h-.375a1.125 1.125 0 01-1.125-1.125V15m1.5 1.5v-.75A.75.75 0 003 15h-.75M15 10.5a3 3 0 11-6 0 3 3 0 016 0zm3 0h.008v.008H18V10.5zm-12 0h.008v.008H6V10.5z" /></svg>',
      tax: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>',
      net: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" /></svg>',
      chevron: '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" /></svg>'
    };
    
    document.addEventListener('DOMContentLoaded', init);
    
    // 로딩 애니메이션
    let calcInterval;
    function startLoadingAnimation() {
      const screen = document.querySelector('.calc-screen');
      const buttons = document.querySelectorAll('.calc-btn');
      
      calcInterval = setInterval(() => {
        const randomNum = Math.floor(Math.random() * 90000) + 10000;
        screen.textContent = randomNum.toLocaleString();
        
        const randomBtn = buttons[Math.floor(Math.random() * buttons.length)];
        randomBtn.classList.add('active');
        setTimeout(() => randomBtn.classList.remove('active'), 300);
      }, 500);
    }
    
    function stopLoadingAnimation() {
      if (calcInterval) clearInterval(calcInterval);
    }
    
    function init() {
      startLoadingAnimation();
      
      const savedPassword = localStorage.getItem('jangsuhan_baekseok_password');
      if (savedPassword) { 
        APP_STATE.password = savedPassword; 
        showMainApp(); 
      } else { 
        showLogin(); 
      }
      
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      
      initDatePickers();
    }

    function showLogin() { 
      stopLoadingAnimation();
      document.getElementById('loadingScreen').style.display = 'none'; 
      document.getElementById('loginContainer').style.display = 'flex'; 
    }
    
    function showMainApp() { 
      document.getElementById('loadingScreen').style.display = 'none'; 
      document.getElementById('loginContainer').style.display = 'none'; 
      document.getElementById('mainApp').classList.remove('hidden'); 
      loadAllData(); 
    }
    
    async function handleLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === '940216') {
        APP_STATE.password = pw;
        localStorage.setItem('jangsuhan_baekseok_password', pw);
        showMainApp();
      } else {
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    }

    function initDatePickers() {
      const yp = document.getElementById('yearPicker');
      const mp = document.getElementById('monthPicker');
      
      for (let y = 2025; y <= 2027; y++) { 
        yp.innerHTML += `<option value="${y}" ${y === 2026 ? 'selected' : ''}>${y}년</option>`; 
      }
      for (let m = 1; m <= 12; m++) { 
        mp.innerHTML += `<option value="${m}" ${m === 3 ? 'selected' : ''}>${m}월</option>`; 
      }
      
      yp.onchange = (e) => { APP_STATE.currentYear = parseInt(e.target.value); loadAllData(); };
      mp.onchange = (e) => { APP_STATE.currentMonth = parseInt(e.target.value); loadAllData(); };
    }

    async function loadAllData() {
      document.getElementById('loadingScreen').style.display = 'flex';
      startLoadingAnimation();
      
      try {
        const currentPromise = loadMonthData(APP_STATE.currentYear, APP_STATE.currentMonth);
        const prevMonth = APP_STATE.currentMonth === 1 ? 12 : APP_STATE.currentMonth - 1;
        const prevYear = APP_STATE.currentMonth === 1 ? APP_STATE.currentYear - 1 : APP_STATE.currentYear;
        const prevPromise = loadMonthData(prevYear, prevMonth);
        
        const [current, prev] = await Promise.all([currentPromise, prevPromise]);
        
        APP_STATE.data = current;
        APP_STATE.prevData = prev;
        
        renderUI();
      } catch (e) {
        alert('서버 연결 실패: ' + e.message);
      } finally {
        stopLoadingAnimation();
        document.getElementById('loadingScreen').style.display = 'none';
      }
    }

    async function loadMonthData(year, month) {
      const url = `${APP_CONFIG.API_ENDPOINT}?token=${APP_STATE.password}&branch=${APP_CONFIG.BRANCH}&year=${year}&month=${month}&action=getProfitLoss`;
      const res = await fetch(url);
      const result = await res.json();
      
      if (result.success) {
        return parsePnlData(result.pnlData, result.latestDay);
      }
      return null;
    }

    function parsePnlData(pnlData, latestDay) {
      const map = {};
      pnlData.forEach(item => { 
        const cleanKey = item.label.replace(/\s/g, "").replace(/[0-9.]/g, "");
        map[cleanKey] = item.value; 
      });
      
      const getV = (k) => {
        const target = k.replace(/\s/g, "");
        if (map[target] !== undefined) return map[target];
        const foundKey = Object.keys(map).find(key => key.includes(target) || target.includes(key));
        return foundKey ? map[foundKey] : 0;
      };

      return {
        revenue: { total: getV('매출액'), cash: getV('현금매출'), card: getV('카드매출') },
        cogs: { 
          total: getV('매출원가'),
          육류원가: getV('육류원가') || (getV('고기값') + getV('특양')),
          식자재: getV('식자재') || (getV('미락') + getV('콩나물') + getV('마트')),
          주류원가: getV('주류원가'),
          음료원가: getV('음료원가'),
          items: {
            '고기값': getV('고기값'), '특양': getV('특양'),
            '미락': getV('미락'), '콩나물': getV('콩나물'), '마트': getV('마트')
          }
        },
        grossProfit: getV('매출이익'),
        laborCost: { total: getV('인건비'), items: { '직원급여': getV('직원급여'), '알바급여': getV('알바급여') } },
        rent: getV('임대료'),
        fixedCost: { total: getV('고정비'), items: { '화재보험': getV('화재보험'), '정수기렌탈': getV('정수기렌탈'), '세무사비용': getV('세무사비용'), '가게위생비': getV('가게위생비') } },
        variableCost: { total: getV('변동비'), items: { '카드수수료': getV('카드수수료'), '매장관리비': getV('매장관리비'), '가스사용료': getV('가스사용료'), '기타잡비용': getV('기타잡비용') } },
        operatingProfit: getV('영업이익'),
        tax: { total: getV('세금예수금'), items: { '부가세예수금': getV('부가세예수금'), '종합소득세예수금': getV('종합소득세예수금') } },
        netProfit: getV('순이익') || getV('매출순이익'),
        lastUpdatedDay: latestDay
      };
    }

    function renderUI() {
      const d = APP_STATE.data;
      if (!d) return;
      
      document.getElementById('mainValue').textContent = formatCurrency(d.netProfit);
      
      if (APP_STATE.prevData && APP_STATE.prevData.netProfit) {
        const change = ((d.netProfit - APP_STATE.prevData.netProfit) / APP_STATE.prevData.netProfit * 100).toFixed(1);
        const arrow = change >= 0 ? '▲' : '▼';
        const sign = change >= 0 ? '+' : '';
        const className = change >= 0 ? 'green' : 'red';
        document.getElementById('changePercent').innerHTML = `${arrow} ${sign}${change}%`;
        document.getElementById('changePercent').className = className;
      }
      
      renderPieChart(d);
      renderRatioList(d);
      renderAccounts(d);
    }

    function renderPieChart(d) {
      const canvas = document.getElementById('pieChart');
      const ctx = canvas.getContext('2d');
      const centerX = 70;
      const centerY = 70;
      const radius = 60;
      const innerRadius = 45;
      
      const revenue = d.revenue.total || 1;
      
      // 순이익이 잘 보이도록 밝은 청록색
      const segments = [
        { label: '육류원가', value: d.cogs.육류원가, color: '#e85d4f' },
        { label: '식자재', value: d.cogs.식자재, color: '#c9a055' },
        { label: '주류원가', value: d.cogs.주류원가, color: '#9b7ebd' },
        { label: '음료원가', value: d.cogs.음료원가, color: '#70ad47' },
        { label: '인건비', value: d.laborCost.total, color: '#f7931e' },
        { label: '임대료', value: d.rent, color: '#8b8b8b' },
        { label: '고정비', value: d.fixedCost.total, color: '#6b7280' },
        { label: '변동비', value: d.variableCost.total, color: '#5a6268' }
      ];
      
      // 순이익 (밝은 청록색)
      const netProfitSegment = { label: '순이익', value: d.netProfit, color: '#00D9FF' };
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      let startAngle = -Math.PI / 2;
      
      // 순이익 먼저 그리기
      if (netProfitSegment.value > 0) {
        const sliceAngle = (netProfitSegment.value / revenue) * 2 * Math.PI;
        
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
        ctx.arc(centerX, centerY, innerRadius, startAngle + sliceAngle, startAngle, true);
        ctx.closePath();
        ctx.fillStyle = netProfitSegment.color;
        ctx.fill();
        ctx.strokeStyle = '#2d3238';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        startAngle += sliceAngle;
      }
      
      // 나머지 비용들
      segments.forEach(seg => {
        if (seg.value > 0) {
          const sliceAngle = (seg.value / revenue) * 2 * Math.PI;
          
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
          ctx.arc(centerX, centerY, innerRadius, startAngle + sliceAngle, startAngle, true);
          ctx.closePath();
          ctx.fillStyle = seg.color;
          ctx.fill();
          ctx.strokeStyle = '#2d3238';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          startAngle += sliceAngle;
        }
      });
      
      const profitPercent = (d.netProfit / revenue * 100).toFixed(1);
      document.getElementById('pieCenterValue').textContent = profitPercent + '%';
    }

    function renderRatioList(d) {
      const container = document.getElementById('ratioList');
      const revenue = d.revenue.total || 1;
      
      const ratios = [
        { label: '순이익', value: d.netProfit, color: '#00D9FF' },
        { label: '육류원가', value: d.cogs.육류원가, color: '#e85d4f' },
        { label: '식자재', value: d.cogs.식자재, color: '#c9a055' },
        { label: '주류원가', value: d.cogs.주류원가, color: '#9b7ebd' },
        { label: '음료원가', value: d.cogs.음료원가, color: '#70ad47' },
        { label: '인건비', value: d.laborCost.total, color: '#f7931e' },
        { label: '임대료', value: d.rent, color: '#8b8b8b' },
        { label: '고정비', value: d.fixedCost.total, color: '#6b7280' },
        { label: '변동비', value: d.variableCost.total, color: '#5a6268' }
      ].map(r => ({
        ...r,
        percent: (r.value / revenue * 100).toFixed(1)
      })).sort((a, b) => b.percent - a.percent);
      
      container.innerHTML = ratios.map(r => `
        <div class="ratio-item">
          <div class="ratio-color" style="background: ${r.color};"></div>
          <div class="ratio-label">${r.label}</div>
          <div class="ratio-value">${r.percent}%</div>
        </div>
      `).join('');
    }

    function renderAccounts(d) {
      const container = document.getElementById('accountsGrid');
      
      const accounts = [
        { icon: ICONS.revenue, label: '매출액', value: d.revenue.total, positive: true, details: { '현금매출': d.revenue.cash, '카드매출': d.revenue.card } },
        { icon: ICONS.cogs, label: '매출원가', value: d.cogs.total, negative: true, details: d.cogs.items },
        { icon: ICONS.profit, label: '매출이익', value: d.grossProfit, positive: true },
        { icon: ICONS.labor, label: '인건비', value: d.laborCost.total, negative: true, details: d.laborCost.items },
        { icon: ICONS.rent, label: '임대료', value: d.rent, negative: true },
        { icon: ICONS.fixed, label: '고정비', value: d.fixedCost.total, negative: true, details: d.fixedCost.items },
        { icon: ICONS.variable, label: '변동비', value: d.variableCost.total, negative: true, details: d.variableCost.items },
        { icon: ICONS.operating, label: '영업이익', value: d.operatingProfit, positive: true },
        { icon: ICONS.tax, label: '세금예수금', value: d.tax.total, negative: true, details: d.tax.items },
        { icon: ICONS.net, label: '순이익', value: d.netProfit, positive: true }
      ];
      
      container.innerHTML = accounts.map(acc => {
        const hasDetails = acc.details && Object.keys(acc.details).length > 0;
        const valueClass = acc.positive ? 'positive' : (acc.negative ? 'negative' : '');
        
        return `
          <div class="account-card" ${hasDetails ? 'onclick="toggleAccount(this)"' : ''}>
            <div class="account-header">
              <div class="account-icon">${acc.icon}</div>
              <div class="account-main">
                <div class="account-label">${acc.label}</div>
                <div class="account-value ${valueClass}">${formatCurrency(acc.value)}</div>
              </div>
              ${hasDetails ? `<div class="account-chevron">${ICONS.chevron}</div>` : ''}
            </div>
            ${hasDetails ? `
              <div class="account-details">
                ${Object.entries(acc.details).map(([k, v]) => `
                  <div class="detail-item">
                    <div class="detail-label">${k}</div>
                    <div class="detail-value ${valueClass}">${formatCurrency(v)}</div>
                  </div>
                `).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function toggleAccount(element) {
      const isExpanded = element.classList.contains('expanded');
      const details = element.querySelector('.account-details');
      
      if (isExpanded) {
        element.classList.remove('expanded');
        details.classList.remove('expanded');
      } else {
        element.classList.add('expanded');
        details.classList.add('expanded');
      }
    }

    function formatCurrency(n) { 
      return (n || 0).toLocaleString() + '원'; 
    }
  </script>
</body>

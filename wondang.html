<!DOCTYPE html
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS (Safari) 아이콘 설정 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="원당점">
  <link rel="apple-touch-icon" href="icons/wondang-icon.png">
  
  <!-- 브라우저 테마 컬러 및 기본 아이콘 -->
  <meta name="theme-color" content="#0a0a0a">
  <link rel="shortcut icon" href="icons/wondang-icon.png">
  <link rel="icon" type="image/png" href="icons/wondang-icon.png">
  
  <title>장수한우곱창 - 원당점</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0a; --bg-secondary: #1a1a1a; --bg-tertiary: #2a2a2a;
      --text-primary: #ffffff; --text-secondary: #a0a0a0; --accent-red: #dc2626;
      --accent-blue: #3b82f6; --accent-yellow: #fbbf24; --accent-green: #22c55e;
      --border-color: #3a3a3a;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding-bottom: 60px; }
    .loading-screen { position: fixed; inset: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .loading-spinner { width: 50px; height: 50px; border: 4px solid var(--bg-tertiary); border-top-color: var(--accent-red); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 20px; color: var(--text-secondary); font-size: 14px; }
    .login-container { display: none; position: fixed; inset: 0; background: var(--bg-primary); align-items: center; justify-content: center; z-index: 9998; padding: 20px; }
    .login-box { background: var(--bg-secondary); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent-red), var(--accent-yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .login-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 30px; }
    .login-input { width: 100%; padding: 16px; background: var(--bg-tertiary); border: 2px solid var(--border-color); border-radius: 12px; color: var(--text-primary); font-size: 18px; text-align: center; letter-spacing: 4px; margin-bottom: 20px; }
    .login-input:focus { outline: none; border-color: var(--accent-red); }
    .login-btn { width: 100%; padding: 16px; background: var(--accent-red); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
    .error-message { color: var(--accent-red); font-size: 14px; margin-top: 10px; display: none; }
    .header { background: var(--bg-secondary); padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
    .app-title { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, var(--accent-red), var(--accent-yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .date-selector { display: flex; gap: 12px; padding: 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
    .date-picker { flex: 1; padding: 12px 16px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-primary); font-size: 15px; text-align: center; cursor: pointer; }
    .summary-card { margin: 16px; padding: 24px; background: linear-gradient(135deg, var(--accent-red), #b91c1c); border-radius: 16px; box-shadow: 0 8px 24px rgba(220, 38, 38, 0.3); }
    .summary-label { color: rgba(255, 255, 255, 0.8); font-size: 14px; margin-bottom: 8px; }
    .summary-value { font-size: 32px; font-weight: 700; color: white; margin-bottom: 8px; }
    .summary-date { color: rgba(255, 255, 255, 0.7); font-size: 13px; }
    .tabs { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); overflow-x: auto; }
    .tab { flex: 1; min-width: 100px; padding: 16px 12px; background: none; border: none; border-bottom: 3px solid transparent; color: var(--text-secondary); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; white-space: nowrap; }
    .tab.active { color: var(--accent-red); border-bottom-color: var(--accent-red); }
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }
    .accordion-item { background: var(--bg-secondary); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 18px; cursor: pointer; transition: background 0.3s; min-height: 60px; }
    .accordion-header:active { background: var(--bg-tertiary); }
    .accordion-title { display: flex; align-items: center; gap: 12px; flex: 1; }
    .accordion-icon { width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; }
    .accordion-label { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .accordion-value { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-right: 8px; }
    .accordion-value.positive { color: var(--accent-blue); }
    .accordion-value.negative { color: var(--accent-red); }
    .accordion-chevron { width: 20px; height: 20px; transition: transform 0.3s; color: var(--text-secondary); flex-shrink: 0; }
    .accordion-header.active .accordion-chevron { transform: rotate(180deg); }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .accordion-content.active { max-height: 2000px; }
    .accordion-details { padding: 0 18px 18px 18px; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-color); font-size: 14px; }
    .detail-label { color: var(--text-secondary); }
    .detail-value { color: var(--text-primary); font-weight: 600; }
    .sub-accordion { margin: 8px 0; }
    .sub-accordion-header { padding: 8px 0; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
    .sub-accordion-label { color: var(--text-secondary); font-size: 14px; }
    .sub-accordion-value { color: var(--text-primary); font-weight: 600; font-size: 14px; }
    .sub-accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; padding-left: 16px; }
    .sub-accordion-content.active { max-height: 500px; }
    .ratio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .ratio-card { background: var(--bg-secondary); border-radius: 12px; padding: 16px; text-align: center; }
    .ratio-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    .ratio-value { font-size: 24px; font-weight: 700; color: var(--text-primary); }
    .ratio-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; margin-top: 8px; overflow: hidden; }
    .ratio-fill { height: 100%; background: linear-gradient(90deg, var(--accent-red), var(--accent-yellow)); border-radius: 3px; transition: width 0.5s ease-out; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">장부 연결 중...</div>
  </div>
  
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <div class="login-title">장수한우곱창</div>
      <div class="login-subtitle">원당점 손익계산서</div>
      <input type="password" class="login-input" id="passwordInput" placeholder="비밀번호" maxlength="6" inputmode="numeric">
      <button class="login-btn" id="loginBtn">로그인</button>
      <div class="error-message" id="errorMessage">비밀번호가 올바르지 않습니다</div>
    </div>
  </div>
  
  <div id="mainApp" class="hidden">
    <div class="header">
      <div class="app-title">🥩 장수한우곱창 원당점</div>
    </div>
    
    <div class="date-selector">
      <select class="date-picker" id="yearPicker"></select>
      <select class="date-picker" id="monthPicker"></select>
    </div>
    
    <div class="summary-card">
      <div class="summary-label">매출 순 이익</div>
      <div class="summary-value" id="summaryValue">- 원</div>
      <div class="summary-date" id="summaryDate">-</div>
    </div>
    
    <div class="tabs">
      <button class="tab active" data-tab="pl">손익계산서</button>
      <button class="tab" data-tab="analysis">비율 분석</button>
    </div>
    
    <div class="tab-content active" data-tab-content="pl" id="plContent"></div>
    
    <div class="tab-content" data-tab-content="analysis">
      <div class="ratio-grid" id="ratioGrid"></div>
    </div>
  </div>
  
  <script>
    const APP_CONFIG = {
      BRANCH: '원당점',
      API_ENDPOINT: 'https://script.google.com/macros/s/AKfycby8JIFlUFJrGY7swJ9rHi79Iu5i2Qqq6gZy80WsrGNAHnx2ebctUVG0j8R17-vrmabY/exec'
    };
    
    const APP_STATE = { password: null, currentYear: 2026, currentMonth: 3, data: null };
    
    document.addEventListener('DOMContentLoaded', init);
    
    function init() {
      const savedPassword = localStorage.getItem('jangsuhan_wondang_password');
      if (savedPassword) { APP_STATE.password = savedPassword; showMainApp(); } 
      else { showLogin(); }
      
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('passwordInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
      
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          const tabName = tab.dataset.tab;
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.querySelector(`[data-tab-content="${tabName}"]`).classList.add('active');
        });
      });
      initDatePickers();
    }

    function showLogin() { document.getElementById('loadingScreen').style.display = 'none'; document.getElementById('loginContainer').style.display = 'flex'; }
    function showMainApp() { document.getElementById('loadingScreen').style.display = 'none'; document.getElementById('loginContainer').style.display = 'none'; document.getElementById('mainApp').classList.remove('hidden'); loadData(); }
    
    async function handleLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === '940216') {
        APP_STATE.password = pw;
        localStorage.setItem('jangsuhan_wondang_password', pw);
        showMainApp();
      } else {
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    }

    function initDatePickers() {
      const yp = document.getElementById('yearPicker'); const mp = document.getElementById('monthPicker');
      for (let y = 2025; y <= 2027; y++) { yp.innerHTML += `<option value="${y}" ${y === 2026 ? 'selected' : ''}>${y}년</option>`; }
      for (let m = 1; m <= 12; m++) { mp.innerHTML += `<option value="${m}" ${m === 3 ? 'selected' : ''}>${m}월</option>`; }
      yp.onchange = (e) => { APP_STATE.currentYear = parseInt(e.target.value); loadData(); };
      mp.onchange = (e) => { APP_STATE.currentMonth = parseInt(e.target.value); loadData(); };
    }

    async function loadData() {
      document.getElementById('loadingScreen').style.display = 'flex';
      try {
        const url = `${APP_CONFIG.API_ENDPOINT}?token=${APP_STATE.password}&branch=${APP_CONFIG.BRANCH}&year=${APP_STATE.currentYear}&month=${APP_STATE.currentMonth}&action=getProfitLoss`;
        const res = await fetch(url);
        const result = await res.json();
        if (result.success) {
          APP_STATE.data = parsePnlData(result.pnlData, result.latestDay);
          renderUI();
        } else { alert('데이터 오류: ' + result.message); }
      } catch (e) { alert('서버 연결 실패'); }
      finally { document.getElementById('loadingScreen').style.display = 'none'; }
    }

    function parsePnlData(pnlData, latestDay) {
      const map = {};
      pnlData.forEach(item => { 
        const cleanKey = item.label.replace(/\s/g, "").replace(/[0-9.]/g, "");
        map[cleanKey] = item.value; 
      });
      
      const getV = (k) => {
        const target = k.replace(/\s/g, "");
        if (map[target] !== undefined) return map[target];
        const foundKey = Object.keys(map).find(key => key.includes(target) || target.includes(key));
        return foundKey ? map[foundKey] : 0;
      };

      return {
        revenue: { total: getV('매출액'), cash: getV('현금매출'), card: getV('카드매출') },
        cogs: {
          total: getV('매출원가'),
          육류원가: getV('육류원가') || (getV('고기값') + getV('특양')),
          식자재: getV('식자재') || (getV('미락') + getV('콩나물') + getV('마트')),
          주류원가: getV('주류원가'),
          음료원가: getV('음료원가'),
          items: {
            '고기값': getV('고기값'), '특양': getV('특양'),
            '미락': getV('미락'), '콩나물': getV('콩나물'), '네이버주문': getV('네이버주문'), '마트': getV('마트'), '쿠팡': getV('쿠팡')
          }
        },
        grossProfit: getV('매출이익'),
        laborCost: { total: getV('인건비'), items: { '직원급여': getV('직원급여'), '알바급여': getV('알바급여') } },
        rent: getV('임대료'),
        fixedCost: { total: getV('고정비'), items: { '화재보험': getV('화재보험'), '정수기렌탈': getV('정수기렌탈'), '세무사비용': getV('세무사비용') } },
        variableCost: { total: getV('변동비'), items: { '카드수수료': getV('카드수수료'), '매장관리비': getV('매장관리비') || getV('관리비'), '가스사용료': getV('가스사용료'), '광고비용': getV('광고비용'), '기타비용': getV('기타비용') } },
        operatingProfit: getV('영업이익'),
        tax: { total: getV('세금예수금'), items: { '부가세예수금': getV('부가세예수금'), '종합소득세예수금': getV('종합소득세예수금') } },
        netProfit: getV('순이익') || getV('매출순이익'),
        lastUpdatedDay: latestDay
      };
    }

    function renderUI() {
      const d = APP_STATE.data;
      if(!d) return;
      document.getElementById('summaryValue').textContent = formatCurrency(d.netProfit);
      document.getElementById('summaryDate').textContent = d.lastUpdatedDay !== '-' ? `'${d.lastUpdatedDay}일'까지의 손익계산서` : '정산 데이터 집계 중';
      
      const container = document.getElementById('plContent');
      container.innerHTML = '';
      
      const list = [
        { title: '매출액', value: d.revenue.total, isPositive: true, details: { '현금매출': d.revenue.cash, '카드매출': d.revenue.card } },
        { title: '매출원가', value: d.cogs.total, isNegative: true, subCategories: [
          { title: '육류원가', value: d.cogs.육류원가, items: { '고기값': d.cogs.items['고기값'], '특양': d.cogs.items['특양'] } },
          { title: '식자재&공산품', value: d.cogs.식자재, items: { '미락': d.cogs.items['미락'], '콩나물': d.cogs.items['콩나물'], '마트': d.cogs.items['마트'] } },
          { title: '주류원가', value: d.cogs.주류원가 }, { title: '음료원가', value: d.cogs.음료원가 }
        ]},
        { title: '매출이익', value: d.grossProfit, isPositive: true },
        { title: '인건비', value: d.laborCost.total, isNegative: true, details: d.laborCost.items },
        { title: '임대료', value: d.rent, isNegative: true },
        { title: '고정비', value: d.fixedCost.total, isNegative: true, details: d.fixedCost.items },
        { title: '변동비', value: d.variableCost.total, isNegative: true, details: d.variableCost.items },
        { title: '영업이익', value: d.operatingProfit, isPositive: true },
        { title: '세금예수금', value: d.tax.total, isNegative: true, details: d.tax.items },
        { title: '매출 순 이익', value: d.netProfit, isPositive: true }
      ];

      list.forEach(item => {
        const div = document.createElement('div');
        div.className = 'accordion-item';
        const hasDetails = (item.details && Object.keys(item.details).length > 0) || (item.subCategories && item.subCategories.length > 0);
        let colorClass = item.isPositive ? 'positive' : (item.isNegative ? 'negative' : '');
        
        let detailsHTML = '';
        if (item.subCategories) {
          detailsHTML = `<div class="accordion-content"><div class="accordion-details">` + 
            item.subCategories.map(sub => `
              <div class="sub-accordion">
                <div class="sub-accordion-header" onclick="this.nextElementSibling.classList.toggle('active')">
                  <span class="sub-accordion-label">${sub.title}</span>
                  <span class="sub-accordion-value">${formatCurrency(sub.value)}</span>
                </div>
                ${sub.items ? `<div class="sub-accordion-content">${Object.entries(sub.items).map(([k, v]) => `<div class="detail-row"><span class="detail-label">${k}</span><span class="detail-value">${formatCurrency(v)}</span></div>`).join('')}</div>` : ''}
              </div>`).join('') + `</div></div>`;
        } else if (item.details) {
          detailsHTML = `<div class="accordion-content"><div class="accordion-details">${Object.entries(item.details).map(([k, v]) => `<div class="detail-row"><span class="detail-label">${k}</span><span class="detail-value">${formatCurrency(v)}</span></div>`).join('')}</div></div>`;
        }

        div.innerHTML = `<div class="accordion-header" onclick="${hasDetails ? 'this.classList.toggle(\'active\'); this.nextElementSibling.classList.toggle(\'active\')' : ''}">
          <div class="accordion-title"><div class="accordion-icon"></div><div class="accordion-label">${item.title}</div></div>
          <div style="display:flex; align-items:center;"><div class="accordion-value ${colorClass}">${formatCurrency(item.value)}</div>${hasDetails ? '<div class="accordion-chevron">▼</div>' : ''}</div>
        </div>${detailsHTML}`;
        container.appendChild(div);
      });

      const ratioGrid = document.getElementById('ratioGrid');
      ratioGrid.innerHTML = '';
      const rev = d.revenue.total || 1; 
      const ratios = [
        { l: '육류원가', v: (d.cogs.육류원가 / rev) * 100 },
        { l: '식자재&공산품', v: (d.cogs.식자재 / rev) * 100 },
        { l: '주류원가', v: (d.cogs.주류원가 / rev) * 100 },
        { l: '음료원가', v: (d.cogs.음료원가 / rev) * 100 },
        { l: '인건비', v: (d.laborCost.total / rev) * 100 },
        { l: '임대료', v: (d.rent / rev) * 100 },
        { l: '고정비', v: (d.fixedCost.total / rev) * 100 },
        { l: '변동비', v: (d.variableCost.total / rev) * 100 },
        { l: '순이익률', v: (d.netProfit / rev) * 100 }
      ];
      ratios.forEach(r => {
        ratioGrid.innerHTML += `<div class="ratio-card"><div class="ratio-label">${r.l}</div><div class="ratio-value">${r.v.toFixed(1)}%</div><div class="ratio-bar"><div class="ratio-fill" style="width: ${Math.min(r.v, 100)}%;"></div></div></div>`;
      });
    }

    function formatCurrency(n) { return (n || 0).toLocaleString() + '원'; }
  </script>
</body>
</html>

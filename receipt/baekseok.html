<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoi7J6l7IiY7ZWc7JqwIOyYgeyImOymneu2hOyEneq4sCIsInNob3J0X25hbWUiOiLrsLHshJ3soJAiLCJzdGFydF91cmwiOiIuL2JhZWtzZW9rLmh0bWwiLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGYxMTE3IiwidGhlbWVfY29sb3IiOiIjMzRBODUzIiwiaWNvbnMiOlt7InNyYyI6Ii4vaWNvbnMvaWNvbi5wbmciLCJzaXplcyI6IjE5MngxOTIiLCJ0eXBlIjoiaW1hZ2UvcG5nIn1dfQ==">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="백석점">
<link rel="apple-touch-icon" href="./icons/icon.png">
<meta name="theme-color" content="#34A853">
<title>장수한우 백석점</title>
<style>
:root{--bg:#0f1117;--sur:#181b27;--sur2:#1e2236;--brd:#2c3050;--acc:#34A853;--acc-d:rgba(52,168,83,.13);--acc-b:rgba(52,168,83,.5);--tx:#e8eaf0;--tx2:#7a7d94;--r:14px;--r2:20px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,"Helvetica Neue",sans-serif;background:var(--bg);min-height:100vh;color:var(--tx)}
.hdr{background:linear-gradient(180deg,#1a1d2e 0%,#12152a 100%);border-bottom:1px solid var(--brd);padding:env(safe-area-inset-top,0) 0 0;position:sticky;top:0;z-index:99}
.hdr-in{padding:16px 20px 14px}
.hdr h1{font-size:20px;font-weight:800;letter-spacing:-.3px}
.hdr h1 em{color:var(--acc);font-style:normal}
.hdr p{font-size:13px;color:var(--tx2);margin-top:4px}
.wrap{padding:20px 16px 64px;max-width:520px;margin:0 auto}
.sec-lbl{font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:1.1px;margin:24px 0 12px}
.sec-lbl:first-child{margin-top:0}
.doc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.doc-btn{background:var(--sur);border:2px solid var(--brd);border-radius:var(--r);padding:20px 10px 18px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s,transform .1s;display:flex;flex-direction:column;align-items:center;gap:9px;-webkit-appearance:none;width:100%}
.doc-btn.sel{border-color:var(--acc-b);background:var(--acc-d);box-shadow:0 0 0 1px var(--acc-b),0 6px 24px rgba(0,0,0,.4)}
.doc-btn:active{transform:scale(.95);opacity:.8}
.btn-emoji{font-size:30px;line-height:1}
.btn-lbl{font-size:14px;font-weight:700;color:var(--tx);line-height:1.3;word-break:keep-all}
.doc-btn.sel .btn-lbl{color:var(--acc)}
.photo-box{background:var(--sur);border:2px dashed var(--brd);border-radius:var(--r2);padding:36px 20px;text-align:center;cursor:pointer;margin-top:8px;transition:border-color .2s,background .2s}
.photo-box.has{border-color:var(--acc);border-style:solid;background:var(--acc-d)}
.ph-icon{font-size:48px;margin-bottom:12px;line-height:1}
.ph-txt{font-size:17px;font-weight:700;color:var(--tx)}
.ph-sub{font-size:13px;color:var(--tx2);margin-top:5px}
#fileInput{display:none}
#preview{max-width:100%;max-height:180px;border-radius:12px;margin-top:14px;display:none;object-fit:contain}
.add-btn{display:block;width:100%;padding:17px;margin:14px 0 0;font-size:17px;font-weight:700;background:var(--sur2);color:var(--acc);border:2px solid var(--acc-b);border-radius:var(--r2);cursor:pointer;transition:transform .1s,opacity .15s}
.add-btn:not(:disabled):active{transform:scale(.97)}
.add-btn:disabled{opacity:.25;cursor:not-allowed}
.queue-wrap{margin-top:4px}
.queue-item{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.qi-num{font-size:14px;font-weight:700;color:var(--acc);min-width:22px}
.qi-info{flex:1}
.qi-type{font-size:15px;font-weight:700;color:var(--tx)}
.qi-file{font-size:12px;color:var(--tx2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.qi-status{font-size:20px;min-width:28px;text-align:right}
.submit-btn{display:block;width:100%;padding:20px;margin:20px 0 10px;font-size:19px;font-weight:800;background:var(--acc);color:#fff;border:none;border-radius:var(--r2);cursor:pointer;transition:transform .1s,opacity .15s;box-shadow:0 4px 24px rgba(52,168,83,.4)}
.submit-btn:not(:disabled):active{transform:scale(.97)}
.submit-btn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
.status{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r2);padding:24px 20px;margin-top:12px;display:none;margin-bottom:16px}
.status.show{display:block}
.s-icon{font-size:44px;text-align:center;margin-bottom:12px}
.s-txt{text-align:center;font-size:20px;font-weight:800;color:var(--tx)}
.s-detail{text-align:center;font-size:15px;color:var(--tx2);margin-top:8px;white-space:pre-line;line-height:1.6}
.loader{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.25);border-top:3px solid #fff;border-radius:50%;animation:spin .9s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-in">
    <h1>🐄 장수한우 <em>백석점</em></h1>
    <p>영수증 · 정산서 업로드</p>
  </div>
</div>
<div class="wrap">
<div class="sec-lbl">① 문서 유형 선택</div>
<div class="doc-grid">
  <button class="doc-btn" onclick="sel(this,'마감정산서')"><span class="btn-emoji">📊</span><span class="btn-lbl">마감정산서</span></button>
  <button class="doc-btn" onclick="sel(this,'고기값')"><span class="btn-emoji">🥩</span><span class="btn-lbl">고기값</span></button>
  <button class="doc-btn" onclick="sel(this,'음료수')"><span class="btn-emoji">🥤</span><span class="btn-lbl">음료수</span></button>
  <button class="doc-btn" onclick="sel(this,'미락')"><span class="btn-emoji">🧾</span><span class="btn-lbl">미락</span></button>
  <button class="doc-btn" onclick="sel(this,'콩나물')"><span class="btn-emoji">🥬</span><span class="btn-lbl">콩나물</span></button>
  <button class="doc-btn" onclick="sel(this,'주류')"><span class="btn-emoji">🍶</span><span class="btn-lbl">주류</span></button>
  <button class="doc-btn" onclick="sel(this,'관리비')"><span class="btn-emoji">🏢</span><span class="btn-lbl">관리비</span></button>
  <button class="doc-btn" onclick="sel(this,'가스')"><span class="btn-emoji">🔥</span><span class="btn-lbl">가스</span></button>
  <button class="doc-btn" onclick="sel(this,'기타')" style="grid-column:1/-1"><span class="btn-emoji">📄</span><span class="btn-lbl">기타</span></button>
</div>

<div class="sec-lbl">② 사진 촬영 / 선택</div>
<div class="photo-box" id="photoBox" onclick="document.getElementById('fileInput').click()">
  <div class="ph-icon">📷</div>
  <div class="ph-txt" id="phTxt">여기를 눌러 사진 선택</div>
  <div class="ph-sub" id="phSub">카메라 촬영 또는 갤러리에서 선택</div>
  <img id="preview">
</div>
<input type="file" id="fileInput" accept="image/*" capture="environment" onchange="handleFile(this)">
<button id="addBtn" class="add-btn" onclick="addToQueue()" disabled>+ 목록에 추가</button>

<div class="queue-wrap" id="queueWrap" style="display:none">
  <div class="sec-lbl" style="margin-top:20px">③ 업로드 목록</div>
  <div id="queueList"></div>
</div>
<button id="submitBtn" class="submit-btn" onclick="submitAll()" disabled>모두 제출하기</button>
<div class="status" id="status">
  <div class="s-icon" id="sIcon"></div>
  <div class="s-txt" id="sTxt"></div>
  <div class="s-detail" id="sDetail"></div>
</div>
</div>
<script>
var GAS_URL="https://script.google.com/macros/s/AKfycbxvvTbp_Wf-zvQ6e17dE2vKsaXdSSTV9vv5RUSPrTc44IxzNPfFJIgQEs944MEYY1WN/exec";
var STORE="백석점";
var _docType="",_b64="",_mime="",_fname="",_queue=[],_running=false;
function sel(btn,type){
  document.querySelectorAll(".doc-btn").forEach(function(b){b.classList.remove("sel")});
  btn.classList.add("sel");_docType=type;chk();
}
function chk(){document.getElementById("addBtn").disabled=!(_docType&&_b64)||_running;}
function handleFile(inp){
  if(!inp.files||!inp.files[0])return;
  var f=inp.files[0];_fname=f.name;_mime="image/jpeg";
  document.getElementById("phTxt").textContent="압축 중...";
  var r=new FileReader();
  r.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var MAX=1600,w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      var c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      var url=c.toDataURL("image/jpeg",0.85);
      _b64=url.split(",")[1];
      var kb=Math.round(_b64.length*0.75/1024);
      var prev=document.getElementById("preview");
      prev.src=url;prev.style.display="block";
      document.getElementById("photoBox").classList.add("has");
      document.getElementById("phTxt").textContent=f.name;
      document.getElementById("phSub").textContent=w+"×"+h+" · "+kb+"KB";
      chk();
    };img.src=e.target.result;
  };r.readAsDataURL(f);
}
function addToQueue(){
  if(!_docType||!_b64)return;
  _queue.push({docType:_docType,b64:_b64,mime:_mime,fname:_fname,status:"대기"});
  renderQueue();_b64="";_fname="";
  var prev=document.getElementById("preview");prev.src="";prev.style.display="none";
  document.getElementById("photoBox").classList.remove("has");
  document.getElementById("phTxt").textContent="여기를 눌러 사진 선택";
  document.getElementById("phSub").textContent="카메라 촬영 또는 갤러리에서 선택";
  document.getElementById("fileInput").value="";
  document.getElementById("addBtn").disabled=true;
  document.getElementById("submitBtn").disabled=false;
}
function renderQueue(){
  var wrap=document.getElementById("queueWrap");
  wrap.style.display=_queue.length?"block":"none";
  document.getElementById("queueList").innerHTML=_queue.map(function(item,i){
    var icon=item.status==="대기"?"🕐":item.status==="업로드중"?"⏳":item.status==="완료"?"✅":"❌";
    return "<div class='queue-item'><span class='qi-num'>"+(i+1)+"</span><div class='qi-info'><div class='qi-type'>"+item.docType+"</div><div class='qi-file'>"+(item.fname||"파일")+"</div></div><span class='qi-status'>"+icon+"</span></div>";
  }).join("");
}
function submitAll(){
  if(!_queue.filter(function(q){return q.status==="대기";}).length)return;
  _running=true;
  document.getElementById("addBtn").disabled=true;
  document.getElementById("submitBtn").disabled=true;
  document.getElementById("submitBtn").innerHTML='<span class="loader"></span> 업로드 중...';
  showStatus("⏳","업로드 중...",_queue.length+"개 파일을 저장합니다.");
  processNext(0);
}
function processNext(idx){
  while(idx<_queue.length&&_queue[idx].status!=="대기")idx++;
  if(idx>=_queue.length){
    _running=false;
    var done=_queue.filter(function(q){return q.status==="완료";}).length;
    var err=_queue.filter(function(q){return q.status==="오류";}).length;
    var btn=document.getElementById("submitBtn");
    if(err===0){showStatus("✅","모두 완료!",done+"개 파일이 저장됐어요.\n새벽 2시에 자동 분류됩니다.");btn.innerHTML="✅ 완료! 새로고침하여 계속";}
    else{showStatus("⚠️","일부 오류",done+"개 성공 / "+err+"개 오류");btn.innerHTML="⚠️ 다시 시도";}
    btn.disabled=false;btn.onclick=function(){location.reload();};return;
  }
  var item=_queue[idx];item.status="업로드중";renderQueue();
  showStatus("⏳","업로드 중... ("+(idx+1)+"/"+_queue.length+")",item.docType+" 저장 중...");
  fetch(GAS_URL,{
    method:"POST",
    body:JSON.stringify({base64:item.b64,mime:item.mime,docType:item.docType,store:STORE,fname:item.fname})
  })
  .then(function(r){return r.json();})
  .then(function(r){item.status=r.success?"완료":"오류";renderQueue();processNext(idx+1);})
  .catch(function(){item.status="오류";renderQueue();processNext(idx+1);});
}
function showStatus(icon,txt,detail){
  var s=document.getElementById("status");s.classList.add("show");
  document.getElementById("sIcon").textContent=icon;
  document.getElementById("sTxt").textContent=txt;
  document.getElementById("sDetail").textContent=detail;
  s.scrollIntoView({behavior:"smooth"});
}
</script>
</body>
</html>

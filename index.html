<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="장수한우">
  <title>장수한우곱창 v16.0</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0a0a0a; --bg-secondary: #1a1a1a; --bg-tertiary: #2a2a2a;
      --text-primary: #ffffff; --text-secondary: #a0a0a0;
      --accent-red: #dc2626; --accent-blue: #3b82f6; --accent-yellow: #fbbf24;
      --border-color: #3a3a3a;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; padding-bottom: 60px; }
    
    /* 로딩 애니메이션 */
    .loading-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .loading-spinner { width: 50px; height: 50px; border: 4px solid var(--bg-tertiary); border-top-color: var(--accent-red); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 20px; color: var(--text-secondary); font-size: 14px; }
    
    /* 로그인 화면 */
    .login-container { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); align-items: center; justify-content: center; z-index: 9998; padding: 20px; }
    .login-box { background: var(--bg-secondary); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; }
    .login-title { font-size: 24px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(135deg, var(--accent-red), var(--accent-yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-input { width: 100%; padding: 16px; background: var(--bg-tertiary); border: 2px solid var(--border-color); border-radius: 12px; color: var(--text-primary); font-size: 18px; text-align: center; letter-spacing: 4px; margin-bottom: 20px; }
    .login-btn { width: 100%; padding: 16px; background: var(--accent-red); border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
    
    /* 상단 헤더 */
    .header { background: var(--bg-secondary); padding: 20px; text-align: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
    .app-title { font-size: 18px; font-weight: 800; background: linear-gradient(135deg, var(--accent-red), var(--accent-yellow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* 지점 선택 */
    .branch-selector { display: flex; gap: 10px; padding: 16px; background: var(--bg-secondary); }
    .branch-btn { flex: 1; padding: 14px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 10px; color: var(--text-secondary); font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .branch-btn.active { background: var(--accent-red); border-color: var(--accent-red); color: white; transform: scale(1.02); }
    
    /* 날짜 선택 */
    .date-selector { display: flex; gap: 8px; padding: 12px 16px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
    .date-picker { flex: 1; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-primary); font-size: 14px; text-align: center; }
    
    /* 메인 요약 카드 */
    .summary-card { margin: 16px; padding: 24px; background: linear-gradient(135deg, #1e1e1e, #000); border: 1px solid var(--border-color); border-radius: 20px; position: relative; overflow: hidden; }
    .summary-card::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(220,38,38,0.1) 0%, transparent 70%); pointer-events: none; }
    .summary-label { color: var(--text-secondary); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .summary-value { font-size: 28px; font-weight: 800; color: white; margin-bottom: 4px; }
    .summary-date { color: var(--accent-red); font-size: 12px; font-weight: 700; }
    
    /* 탭 메뉴 */
    .tabs { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); }
    .tab { flex: 1; padding: 16px; background: none; border: none; border-bottom: 3px solid transparent; color: var(--text-secondary); font-size: 14px; font-weight: 700; cursor: pointer; }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--accent-red); }
    
    /* 아코디언 스타일 */
    .tab-content { display: none; padding: 16px; }
    .tab-content.active { display: block; }
    .accordion-item { background: var(--bg-secondary); border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border-color); }
    .accordion-header { display: flex; justify-content: space-between; align-items: center; padding: 18px; cursor: pointer; }
    .accordion-label { font-size: 14px; font-weight: 700; }
    .accordion-value { font-size: 15px; font-weight: 800; }
    .positive { color: var(--accent-blue); }
    .negative { color: var(--accent-red); }
    .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .accordion-content.active { max-height: 1000px; }
    .accordion-details { padding: 0 18px 18px 18px; }
    .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #333; font-size: 13px; color: var(--text-secondary); }
    .detail-row span:last-child { color: var(--text-primary); font-weight: 600; }

    /* 차트 컨테이너 */
    .chart-container { background: var(--bg-secondary); border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border-color); }
    .chart-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--text-secondary); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- 로딩 스크린 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div class="loading-text">데이터를 실시간 동기화 중입니다...</div>
  </div>
  
  <!-- 로그인 섹션 -->
  <div class="login-container" id="loginContainer">
    <div class="login-box">
      <div class="login-title">장수한우 관리 시스템</div>
      <input type="password" class="login-input" id="passwordInput" placeholder="PASSCODE" maxlength="6" inputmode="numeric">
      <button class="login-btn" id="loginBtn">시스템 접속</button>
      <div id="errorMessage" style="color:var(--accent-red); margin-top:15px; font-size: 13px; font-weight: bold; display:none;">인증번호가 올바르지 않습니다.</div>
    </div>
  </div>
  
  <!-- 메인 앱 UI -->
  <div id="mainApp" class="hidden">
    <div class="header"><div class="app-title">JANGSU HANU DASHBOARD v16.0</div></div>
    
    <div class="branch-selector">
      <button class="branch-btn active" data-branch="원당점">📍 원당본점</button>
      <button class="branch-btn" data-branch="백석점">📍 백석점</button>
    </div>
    
    <div class="date-selector">
      <select class="date-picker" id="yearPicker"></select>
      <select class="date-picker" id="monthPicker"></select>
    </div>
    
    <div class="summary-card">
      <div class="summary-label">이번 달 정산 순이익</div>
      <div class="summary-value" id="summaryValue">0원</div>
      <div class="summary-date" id="summaryDate">장부 업데이트 대기 중</div>
    </div>
    
    <div class="tabs">
      <button class="tab active" data-tab="pl">손익 보고서</button>
      <button class="tab" data-tab="trend">추이 분석</button>
    </div>
    
    <!-- 손익계산서 탭 -->
    <div class="tab-content active" data-tab-content="pl" id="plContent"></div>
    
    <!-- 월별 추이 탭 -->
    <div class="tab-content" data-tab-content="trend">
      <div class="chart-container">
        <div class="chart-title">매출액 흐름 (최근 6개월)</div>
        <canvas id="revenueChart"></canvas>
      </div>
      <div class="chart-container">
        <div class="chart-title">순이익 흐름 (최근 6개월)</div>
        <canvas id="profitChart"></canvas>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const STATE = {
      // 🚨 사장님: 구글 스크립트 '배포 URL'을 아래에 정확히 입력해 주세요.
      apiEndpoint: 'https://script.google.com/macros/s/AKfycbySE3dXkt5PaNiJmEYg-XY6PJ1_LmkSdoRqZlRcBzlqyGGb1TJNfzXqGmRgEcgOu6LF/exec',
      token: null, branch: '원당점', year: 2026, month: 2, data: null
    };
    
    document.addEventListener('DOMContentLoaded', () => {
      const savedPass = localStorage.getItem('jangsu_token');
      if (savedPass) { STATE.token = savedPass; startApp(); } else { showLogin(); }
      
      document.getElementById('loginBtn').onclick = login;
      document.querySelectorAll('.branch-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.branch-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          STATE.branch = btn.dataset.branch;
          refreshData();
        };
      });
      
      document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.querySelector(`[data-tab-content="${tab.dataset.tab}"]`).classList.add('active');
          if (tab.dataset.tab === 'trend') renderCharts();
        };
      });
      
      initPickers();
    });

    function showLogin() { document.getElementById('loginContainer').style.display = 'flex'; }
    function startApp() { 
      document.getElementById('loginContainer').style.display = 'none';
      document.getElementById('mainApp').classList.remove('hidden');
      refreshData();
    }
    
    function login() {
      const input = document.getElementById('passwordInput').value.trim();
      if (input === '940216') {
        STATE.token = input;
        localStorage.setItem('jangsu_token', input);
        startApp();
      } else {
        document.getElementById('errorMessage').style.display = 'block';
      }
    }

    function initPickers() {
      const yp = document.getElementById('yearPicker');
      const mp = document.getElementById('monthPicker');
      const now = new Date();
      for (let y = 2025; y <= 2026; y++) {
        let opt = document.createElement('option'); opt.value = y; opt.innerText = y+"년";
        if(y === 2026) opt.selected = true; yp.appendChild(opt);
      }
      for (let m = 1; m <= 12; m++) {
        let opt = document.createElement('option'); opt.value = m; opt.innerText = m+"월";
        if(m === (now.getMonth() + 1)) opt.selected = true; mp.appendChild(opt);
      }
      STATE.month = (now.getMonth() + 1);
      yp.onchange = (e) => { STATE.year = e.target.value; refreshData(); };
      mp.onchange = (e) => { STATE.month = e.target.value; refreshData(); };
    }

    async function refreshData() {
      document.getElementById('loadingScreen').style.display = 'flex';
      try {
        const res = await fetch(`${STATE.apiEndpoint}?token=${STATE.token}&branch=${STATE.branch}&year=${STATE.year}&month=${STATE.month}&action=getProfitLoss`);
        const result = await res.json();
        if (result.success) {
          STATE.data = processRawData(result.pnlData, result.latestDay);
          renderDashboard();
        } else {
          alert("데이터를 가져오지 못했습니다. 시트 이름을 확인해 주세요.");
        }
      } catch (e) { console.error(e); }
      finally { document.getElementById('loadingScreen').style.display = 'none'; }
    }

    // 🛠️ 핵심 로직: v17.5 계정 과목에 맞춘 그룹화
    function processRawData(raw, latestDay) {
      const getVal = (key) => {
        const found = raw.find(i => i.label.replace(/\s/g, "").includes(key.replace(/\s/g, "")));
        return found ? found.value : 0;
      };

      const revTotal = getVal("매출액");
      return {
        day: latestDay,
        profit: getVal("순이익") || getVal("매출순이익") || 0,
        revenue: { total: revTotal, items: { "현금매출": getVal("현금매출"), "카드매출": getVal("카드매출") } },
        cogs: {
          total: getVal("매출원가"),
          groups: [
            { name: "육류원가", total: getVal("고기값") + getVal("특양"), items: { "고기값": getVal("고기값"), "특양": getVal("특양") } },
            { name: "식자재원가", total: getVal("미락") + getVal("콩나물"), items: { "미락": getVal("미락"), "콩나물": getVal("콩나물") } },
            { name: "주류 및 음료", total: getVal("주류원가") + getVal("음료원가"), items: { "주류원가": getVal("주류원가"), "음료원가": getVal("음료원가") } }
          ]
        },
        expenses: {
          total: getVal("가스사용료") + getVal("매장관리비") + getVal("기타잡비용"),
          items: { "가스사용료": getVal("가스사용료"), "매장관리비": getVal("매장관리비"), "기타잡비용": getVal("기타잡비용") }
        },
        other: {
          "매출이익": getVal("매출이익"),
          "영업이익": getVal("영업이익")
        }
      };
    }

    function renderDashboard() {
      const d = STATE.data;
      document.getElementById('summaryValue').innerText = d.profit.toLocaleString() + '원';
      document.getElementById('summaryDate').innerText = d.day !== "-" ? `'${d.day}일' 영업 종료 기준 리포트` : "정산 데이터 확인 중";
      
      const container = document.getElementById('plContent');
      container.innerHTML = '';
      
      const uiMap = [
        { label: "1. 매출액 합계", val: d.revenue.total, color: "positive", sub: d.revenue.items },
        { label: "2. 매출원가 (COGS)", val: d.cogs.total, color: "negative", groups: d.cogs.groups },
        { label: "3. 매출이익", val: d.other["매출이익"], color: "positive" },
        { label: "4. 운영 관리비", val: d.expenses.total, color: "negative", sub: d.expenses.items },
        { label: "5. 영업이익", val: d.other["영업이익"], color: "positive" },
        { label: "6. 최종 순이익", val: d.profit, color: "positive" }
      ];

      uiMap.forEach(item => {
        const el = document.createElement('div');
        el.className = 'accordion-item';
        
        let contentHtml = '';
        if (item.sub) {
          contentHtml = `<div class="accordion-content"><div class="accordion-details">${Object.entries(item.sub).map(([k,v]) => `<div class="detail-row"><span>${k}</span><span>${v.toLocaleString()}원</span></div>`).join('')}</div></div>`;
        } else if (item.groups) {
          contentHtml = `<div class="accordion-content"><div class="accordion-details">${item.groups.map(g => `
            <div style="margin-bottom:12px;"><div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:5px; font-size:13px; color:#ccc;"><span>${g.name}</span><span>${g.total.toLocaleString()}원</span></div>
            ${Object.entries(g.items).map(([k,v]) => `<div class="detail-row" style="padding-left:10px; border:none; opacity:0.7;"><span>└ ${k}</span><span>${v.toLocaleString()}원</span></div>`).join('')}</div>`).join('')}</div></div>`;
        }

        el.innerHTML = `
          <div class="accordion-header" onclick="this.nextElementSibling?.classList.toggle('active')">
            <span class="accordion-label">${item.label}</span>
            <span class="accordion-value ${item.color}">${item.val.toLocaleString()}원</span>
          </div>${contentHtml}`;
        container.appendChild(el);
      });
    }

    let charts = { rev: null, prof: null };
    async function renderCharts() {
      try {
        const res = await fetch(`${STATE.apiEndpoint}?token=${STATE.token}&branch=${STATE.branch}&action=getTrendData`);
        const result = await res.json();
        if (!result.success) return;

        const labels = result.trend.map(t => t.month);
        const config = (data, color) => ({
          type: 'line',
          data: { labels, datasets: [{ data, borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4 }] },
          options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { ticks: { display: false }, grid: { display: false } }, x: { grid: { display: false } } } }
        });

        if (charts.rev) charts.rev.destroy();
        if (charts.prof) charts.prof.destroy();

        charts.rev = new Chart(document.getElementById('revenueChart'), config(result.trend.map(t => t.revenue), '#3b82f6'));
        charts.prof = new Chart(document.getElementById('profitChart'), config(result.trend.map(t => t.profit), '#dc2626'));
      } catch (e) { console.error(e); }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>장수한우 Dashboard v16.2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0a0a0a; --card: #1a1a1a; --text: #ffffff; --red: #dc2626; --blue: #3b82f6; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 50px; }
    .loading { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:40px; height:40px; border:4px solid #333; border-top-color:var(--red); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .header { padding: 20px; text-align: center; background: var(--card); border-bottom: 1px solid #333; }
    .branch-sel { display: flex; padding: 10px; gap: 10px; background: var(--card); }
    .btn { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: #888; font-weight: bold; }
    .btn.active { background: var(--red); color: white; border-color: var(--red); }
    .card { margin: 15px; padding: 20px; background: linear-gradient(135deg, #222, #000); border-radius: 20px; border: 1px solid #333; }
    .summary-val { font-size: 32px; font-weight: 800; margin: 10px 0; }
    .item { background: var(--card); margin: 8px 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    .label { font-size: 14px; font-weight: bold; }
    .val { font-size: 15px; font-weight: 800; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="loading" id="loader"><div class="spinner"></div><p style="margin-top:15px; font-size:13px;">서버 연결 중...</p></div>
  <div class="header" style="font-weight:900; color:var(--red);">🥩 JANGSU HANU DASHBOARD</div>
  <div class="branch-sel">
    <button class="btn active" onclick="selBranch('원당점', this)">원당본점</button>
    <button class="btn" onclick="selBranch('백석점', this)">백석점</button>
  </div>
  <div style="padding: 10px 15px; background:var(--card); display:flex; gap:10px;">
    <select id="month" style="flex:1; padding:10px; background:#2a2a2a; color:white; border:none; border-radius:8px;" onchange="loadData()">
      <option value="1">1월 장부</option><option value="2" selected>2월 장부</option><option value="3">3월 장부</option>
    </select>
  </div>
  <div class="card">
    <div style="font-size:12px; color:#888;">이번 달 정산 순이익</div>
    <div class="summary-val" id="totalProfit">0원</div>
    <div style="font-size:11px; color:var(--red); font-weight:bold;" id="baseDate">데이터 확인 중...</div>
  </div>
  <div id="pnlList"></div>

  <script>
    const CONFIG = {
      // 🚨 사장님: 아래에 새로 배포한 웹 앱 URL을 붙여넣으세요!
      url: 'https://script.google.com/macros/s/AKfycbzuiDeyu-WmpGbCg_lZc3Gq0X0hmSk18Lasxicr_Gag1cu2b11JiIbftwfurLoWLbUR/exec',
      token: '940216', branch: '원당점'
    };

    function selBranch(b, el) {
      document.querySelectorAll('.btn').forEach(x => x.classList.remove('active'));
      el.classList.add('active'); CONFIG.branch = b; loadData();
    }

    async function loadData() {
      const loader = document.getElementById('loader');
      const month = document.getElementById('month').value;
      loader.classList.remove('hidden');
      try {
        const res = await fetch(`${CONFIG.url}?token=${CONFIG.token}&branch=${CONFIG.branch}&month=${month}&action=getProfitLoss`);
        const data = await res.json();
        if (data.success) {
          render(data);
        } else {
          alert("오류: " + data.message);
        }
      } catch (e) {
        alert("서버 연결 실패! 배포 주소와 권한을 확인하세요.");
      } finally {
        loader.classList.add('hidden');
      }
    }

    function render(data) {
      const getV = (k) => data.pnlData.find(i => i.label.includes(k))?.value || 0;
      document.getElementById('totalProfit').innerText = getV("순이익").toLocaleString() + "원";
      document.getElementById('baseDate').innerText = data.latestDay !== "-" ? `${data.latestDay}일 영업 종료 기준` : "데이터 집계 중";
      
      const list = document.getElementById('pnlList');
      list.innerHTML = "";
      const items = [
        { l: "1. 총 매출액", v: getV("매출액"), c: "var(--blue)" },
        { l: "2. 매출원가(COGS)", v: getV("매출원가"), c: "var(--red)" },
        { l: "3. 매출이익", v: getV("매출이익"), c: "var(--blue)" },
        { l: "4. 매장 운영비", v: getV("매장관리비")+getV("가스사용료"), c: "var(--red)" },
        { l: "5. 최종 순이익", v: getV("순이익"), c: "var(--blue)" }
      ];
      items.forEach(i => {
        list.innerHTML += `<div class="item"><span class="label">${i.l}</span><span class="val" style="color:${i.c}">${i.v.toLocaleString()}원</span></div>`;
      });
    }
    window.onload = loadData;
  </script>
</body>
</html>

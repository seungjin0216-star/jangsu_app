<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>장수한우 Dashboard v17.0</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root { 
      --bg: #0a0a0a; 
      --card: #1a1a1a; 
      --input: #2a2a2a;
      --text: #ffffff; 
      --text-dim: #a0a0a0;
      --red: #dc2626; 
      --blue: #3b82f6; 
      --yellow: #fbbf24;
      --border: #333;
    }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }
    
    /* 로딩 */
    .loading { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; }
    .spinner { width:40px; height:40px; border:4px solid #333; border-top-color:var(--red); border-radius:50%; animation:spin 1s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* 헤더 */
    .header { padding: 25px 20px 15px; text-align: center; }
    .header h1 { font-size: 18px; font-weight: 900; color: #f97316; display: flex; align-items: center; justify-content: center; gap: 8px; }

    /* 상단 선택 카드 */
    .selection-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 15px 15px; }
    .select-card { background: var(--card); border-radius: 15px; padding: 15px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; cursor: pointer; transition: 0.2s; }
    .select-card.active { border-color: var(--red); background: linear-gradient(145deg, #2a1010, #1a1a1a); }
    .select-card span { font-size: 12px; color: var(--text-dim); font-weight: bold; }
    .select-card p { font-size: 16px; font-weight: 800; color: var(--text-dim); }
    .select-card.active p { color: white; }

    .date-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; padding: 0 15px 15px; }
    .date-box { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 10px; color: white; text-align: center; font-weight: bold; font-size: 15px; appearance: none; width: 100%; }

    /* 메인 요약 카드 */
    .summary-card { margin: 0 15px 20px; padding: 25px; background: var(--red); border-radius: 25px; box-shadow: 0 10px 30px rgba(220, 38, 38, 0.3); position: relative; overflow: hidden; }
    .summary-card::after { content: "🥩"; position: absolute; right: -10px; bottom: -10px; font-size: 100px; opacity: 0.1; }
    .summary-card .label { font-size: 13px; font-weight: bold; opacity: 0.8; margin-bottom: 8px; }
    .summary-card .value { font-size: 36px; font-weight: 900; letter-spacing: -1px; margin-bottom: 4px; }
    .summary-card .date { font-size: 12px; opacity: 0.7; }

    /* 하단 탭 메뉴 */
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 1px solid #222; display: flex; height: 75px; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #555; cursor: pointer; transition: 0.3s; }
    .tab-item.active { color: var(--red); }
    .tab-item i { font-size: 20px; margin-bottom: 2px; }
    .tab-item span { font-size: 11px; font-weight: bold; }

    /* 컨텐츠 영역 */
    .content-section { display: none; padding: 0 15px; animation: fadeIn 0.3s ease-out; }
    .content-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 리스트 스타일 (손익계산서) */
    .pnl-item { background: var(--card); margin-bottom: 10px; padding: 18px; border-radius: 15px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .pnl-label { font-size: 14px; font-weight: bold; color: var(--text-dim); }
    .pnl-value { font-size: 16px; font-weight: 800; }

    /* 비율 분석 */
    .ratio-card { background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 15px; }
    .ratio-row { margin-bottom: 15px; }
    .ratio-info { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 6px; }
    .ratio-bar-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; }
    .ratio-bar-fill { height: 100%; border-radius: 4px; transition: 1s ease-out; width: 0; }

    /* 차트 */
    .chart-container { background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid var(--border); margin-bottom: 15px; height: 300px; }

    /* 목표 설정 */
    .goal-card { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid var(--border); }
    .goal-input-group { margin-bottom: 20px; }
    .goal-input-group label { display: block; font-size: 12px; color: var(--text-dim); font-weight: bold; margin-bottom: 8px; }
    .goal-input-group input { width: 100%; background: var(--input); border: 1px solid var(--border); padding: 12px; border-radius: 10px; color: white; font-size: 16px; font-weight: bold; }
    .goal-btn { width: 100%; padding: 15px; background: var(--red); color: white; border: none; border-radius: 12px; font-weight: 800; margin-top: 10px; }
    
    .goal-compare { margin-top: 25px; border-top: 1px dashed #444; pt: 20px; }
    .goal-stat { display: flex; justify-content: space-between; margin-top: 15px; }
    .goal-stat div:last-child { text-align: right; }
    .goal-pct { font-size: 24px; font-weight: 900; color: var(--yellow); }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="loading" id="loader"><div class="spinner"></div><p style="margin-top:15px; font-size:13px; font-weight:bold;">데이터 동기화 중...</p></div>

  <header class="header">
    <h1><span>🍊</span> 장수한우곱창 손익계산서</h1>
  </header>

  <!-- 지점 선택 카드 -->
  <div class="selection-grid">
    <div class="select-card active" id="btnWondang" onclick="selBranch('원당점')">
      <span>Main Store</span>
      <p>📍 원당점</p>
    </div>
    <div class="select-card" id="btnBaekseok" onclick="selBranch('백석점')">
      <span>Branch Store</span>
      <p>📍 백석점</p>
    </div>
  </div>

  <!-- 연도/월 선택 -->
  <div class="date-grid">
    <select class="date-box" id="yearSel" onchange="loadData()">
      <option value="2025">2025년</option>
      <option value="2026" selected>2026년</option>
    </select>
    <select class="date-box" id="monthSel" onchange="loadData()">
      <option value="1">1월</option><option value="2">2월</option><option value="3" selected>3월</option>
      <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
      <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
      <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
    </select>
  </div>

  <!-- 요약 카드 -->
  <div class="summary-card">
    <div class="label">매출 순 이익</div>
    <div class="value" id="totalProfit">-</div>
    <div class="date" id="baseDate">데이터 집계 중...</div>
  </div>

  <!-- 컨텐츠 섹션: 손익계산서 -->
  <div id="sec-pnl" class="content-section active">
    <div id="pnlList"></div>
  </div>

  <!-- 컨텐츠 섹션: 비율 분석 -->
  <div id="sec-ratio" class="content-section">
    <div class="ratio-card" id="ratioContent">
      <p style="text-align:center; color:#555; padding:40px;">데이터를 불러오는 중...</p>
    </div>
  </div>

  <!-- 컨텐츠 섹션: 월별 추이 -->
  <div id="sec-trend" class="content-section">
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
    <p style="font-size:11px; color:#555; text-align:center;">최근 6개월 매출 및 순이익 변화 추이</p>
  </div>

  <!-- 컨텐츠 섹션: 목표 설정 -->
  <div id="sec-goal" class="content-section">
    <div class="goal-card">
      <div class="goal-input-group">
        <label>월 목표 매출액 (원)</label>
        <input type="number" id="goalRevInput" placeholder="예: 50000000">
      </div>
      <div class="goal-input-group">
        <label>월 목표 순이익 (원)</label>
        <input type="number" id="goalProfInput" placeholder="예: 15000000">
      </div>
      <button class="goal-btn" onclick="saveGoals()">목표치 저장하기</button>

      <div class="goal-compare">
        <div class="goal-stat">
          <div><p style="font-size:12px; color:var(--text-dim);">매출 달성률</p><p class="goal-pct" id="revPct">0%</p></div>
          <div><p style="font-size:12px; color:var(--text-dim);">현재 매출</p><p style="font-weight:bold;" id="currRev">-</p></div>
        </div>
        <div class="goal-stat">
          <div><p style="font-size:12px; color:var(--text-dim);">순이익 달성률</p><p class="goal-pct" id="profPct" style="color:var(--blue);">0%</p></div>
          <div><p style="font-size:12px; color:var(--text-dim);">현재 이익</p><p style="font-weight:bold;" id="currProf">-</p></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 하단 네비게이션 -->
  <nav class="tab-bar">
    <div class="tab-item active" onclick="switchTab('pnl', this)">
      <i>📋</i><span>손익계산서</span>
    </div>
    <div class="tab-item" onclick="switchTab('ratio', this)">
      <i>📊</i><span>비율 분석</span>
    </div>
    <div class="tab-item" onclick="switchTab('trend', this)">
      <i>📈</i><span>월별 추이</span>
    </div>
    <div class="tab-item" onclick="switchTab('goal', this)">
      <i>🎯</i><span>목표 설정</span>
    </div>
  </nav>

  <script>
    const CONFIG = {
      url: 'https://script.google.com/macros/s/AKfycbzuiDeyu-WmpGbCg_lZc3Gq0X0hmSk18Lasxicr_Gag1cu2b11JiIbftwfurLoWLbUR/exec',
      token: '940216', 
      branch: '원당점'
    };

    let cachedData = null;
    let trendChartObj = null;

    function selBranch(b) {
      CONFIG.branch = b;
      document.getElementById('btnWondang').classList.toggle('active', b === '원당점');
      document.getElementById('btnBaekseok').classList.toggle('active', b === '백석점');
      loadData();
    }

    function switchTab(id, el) {
      document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.content-section').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      document.getElementById('sec-' + id).classList.add('active');
      if(id === 'trend') renderTrendChart();
      if(id === 'ratio') renderRatioAnalysis();
      if(id === 'goal') updateGoalUI();
    }

    async function loadData() {
      const loader = document.getElementById('loader');
      const year = document.getElementById('yearSel').value;
      const month = document.getElementById('monthSel').value;
      loader.classList.remove('hidden');
      
      try {
        const res = await fetch(`${CONFIG.url}?token=${CONFIG.token}&branch=${CONFIG.branch}&year=${year}&month=${month}&action=getProfitLoss`);
        const data = await res.json();
        if (data.success) {
          cachedData = data;
          renderPnL(data);
          updateGoalUI();
        } else {
          alert("데이터를 찾을 수 없습니다: " + data.message);
        }
      } catch (e) {
        alert("서버 연결 실패! 인터넷 상태나 배포 URL을 확인하세요.");
      } finally {
        loader.classList.add('hidden');
      }
    }

    function renderPnL(data) {
      const getV = (k) => data.pnlData.find(i => i.label.includes(k))?.value || 0;
      const profit = getV("순이익") || getV("매출순이익");
      
      document.getElementById('totalProfit').innerText = profit.toLocaleString() + "원";
      document.getElementById('baseDate').innerText = data.latestDay !== "-" ? `${data.latestDay}일 영업 종료 기준 리포트` : "정산 데이터 집계 중";
      
      const list = document.getElementById('pnlList');
      list.innerHTML = "";
      
      data.pnlData.forEach(item => {
        let color = "white";
        if(item.label.includes("매출액") || item.label.includes("이익")) color = "var(--blue)";
        if(item.label.includes("원가") || item.label.includes("지출") || item.label.includes("관리비")) color = "var(--red)";
        
        list.innerHTML += `
          <div class="pnl-item">
            <span class="pnl-label">${item.label}</span>
            <span class="pnl-value" style="color:${color}">${item.value.toLocaleString()}원</span>
          </div>`;
      });
    }

    function renderRatioAnalysis() {
      if(!cachedData) return;
      const getV = (k) => cachedData.pnlData.find(i => i.label.includes(k))?.value || 0;
      const revenue = getV("매출액") || 1;
      
      const items = [
        { l: "매출원가 (COGS)", v: getV("매출원가"), c: "#ef4444" },
        { l: "인건비", v: getV("인건비"), c: "#f97316" },
        { l: "임대료", v: getV("임대료"), c: "#8b5cf6" },
        { l: "매장관리비 (전기/수도 등)", v: getV("매장관리비")+getV("가스사용료"), c: "#3b82f6" },
        { l: "매출 순 이익률", v: getV("순이익"), c: "#10b981" }
      ];

      const container = document.getElementById('ratioContent');
      container.innerHTML = `<h3 style="font-size:15px; margin-bottom:20px;">💰 매출 대비 지출 비중</h3>`;
      
      items.forEach(item => {
        const pct = ((item.v / revenue) * 100).toFixed(1);
        container.innerHTML += `
          <div class="ratio-row">
            <div class="ratio-info"><span>${item.l}</span><span>${pct}%</span></div>
            <div class="ratio-bar-bg"><div class="ratio-bar-fill" style="width:${pct}%; background:${item.c}"></div></div>
          </div>`;
      });
    }

    async function renderTrendChart() {
      const ctx = document.getElementById('trendChart').getContext('2d');
      if(trendChartObj) trendChartObj.destroy();

      // 실제로는 trend action API를 호출해야 하지만, 여기서는 현재 달 기준 샘플 추이를 보여주거나 API 연동 로직을 작성합니다.
      // 사장님 백엔드에 action=getTrendData 가 구현되어 있다고 가정합니다.
      try {
        const res = await fetch(`${CONFIG.url}?token=${CONFIG.token}&branch=${CONFIG.branch}&action=getTrendData`);
        const result = await res.json();
        
        if(result.success) {
          const labels = result.trend.map(t => t.month);
          const revs = result.trend.map(t => t.revenue);
          const profs = result.trend.map(t => t.profit);

          trendChartObj = new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [
                { label: '매출액', data: revs, borderColor: '#3b82f6', tension: 0.4, fill: false },
                { label: '순이익', data: profs, borderColor: '#dc2626', tension: 0.4, fill: false }
              ]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { labels: { color: '#fff', font: { weight: 'bold' } } } },
              scales: {
                y: { grid: { color: '#222' }, ticks: { color: '#888', font: { size: 10 } } },
                x: { grid: { display: false }, ticks: { color: '#888' } }
              }
            }
          });
        }
      } catch(e) {
          console.log("Trend API 호출 실패 - 샘플 데이터 표시");
      }
    }

    // 목표 설정 관련 로직
    function saveGoals() {
      const r = document.getElementById('goalRevInput').value;
      const p = document.getElementById('goalProfInput').value;
      localStorage.setItem('jangsu_goal_rev', r);
      localStorage.setItem('jangsu_goal_prof', p);
      alert("이번 달 목표가 저장되었습니다!");
      updateGoalUI();
    }

    function updateGoalUI() {
      const gRev = localStorage.getItem('jangsu_goal_rev') || 0;
      const gProf = localStorage.getItem('jangsu_goal_prof') || 0;
      document.getElementById('goalRevInput').value = gRev;
      document.getElementById('goalProfInput').value = gProf;

      if(!cachedData) return;
      const getV = (k) => cachedData.pnlData.find(i => i.label.includes(k))?.value || 0;
      const cRev = getV("매출액");
      const cProf = getV("순이익");

      document.getElementById('currRev').innerText = cRev.toLocaleString() + "원";
      document.getElementById('currProf').innerText = cProf.toLocaleString() + "원";
      
      const revPct = gRev > 0 ? Math.min(100, (cRev / gRev) * 100).toFixed(1) : 0;
      const profPct = gProf > 0 ? Math.min(100, (cProf / gProf) * 100).toFixed(1) : 0;

      document.getElementById('revPct').innerText = revPct + "%";
      document.getElementById('profPct').innerText = profPct + "%";
    }

    window.onload = loadData;
  </script>
</body>
</html>

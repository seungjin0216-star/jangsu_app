  <title>장수한우곱창 백석점</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #1a1d24;
      color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: 40px;
    }
    
    .loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #2d3238 0%, #1a1d24 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      overflow: hidden;
    }
    
    .calculator {
      width: 120px;
      height: 160px;
      background: #3a3f47;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      position: relative;
      animation: calculator-bounce 2s ease-in-out infinite;
    }
    
    @keyframes calculator-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    .calc-screen {
      width: 100%;
      height: 40px;
      background: #1f2329;
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #c9a055;
      animation: numbers-change 1.5s infinite;
    }
    
    @keyframes numbers-change {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .calc-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }
    
    .calc-btn {
      aspect-ratio: 1;
      background: #2d3238;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #8b8b8b;
      font-weight: 600;
    }
    
    .calc-btn.active {
      background: #c9a055;
      color: #2d3238;
      animation: button-press 0.3s ease-out;
    }
    
    @keyframes button-press {
      0% { transform: scale(1); }
      50% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    
    .money-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    
    .money {
      position: absolute;
      font-size: 32px;
      animation: money-float 3s ease-in-out infinite;
      opacity: 0.6;
    }
    
    .money:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
    .money:nth-child(2) { right: 15%; top: 30%; animation-delay: 0.5s; }
    .money:nth-child(3) { left: 20%; bottom: 25%; animation-delay: 1s; }
    .money:nth-child(4) { right: 10%; bottom: 35%; animation-delay: 1.5s; }
    .money:nth-child(5) { left: 50%; top: 15%; animation-delay: 0.7s; }
    
    @keyframes money-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-30px) rotate(10deg); }
      50% { transform: translateY(-60px) rotate(-10deg); }
      75% { transform: translateY(-30px) rotate(5deg); }
    }
    
    .loading-text {
      margin-top: 32px;
      color: #c9a055;
      font-size: 16px;
      font-weight: 600;
      animation: text-pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes text-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .login-container {
      display: none;
      position: fixed;
      inset: 0;
      background: #1a1d24;
      align-items: center;
      justify-content: center;
      z-index: 9998;
      padding: 20px;
    }
    
    .login-box {
      background: #2d3238;
      padding: 40px 32px;
      border-radius: 20px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    
    .login-logo { font-size: 48px; margin-bottom: 16px; }
    .login-title { font-size: 22px; font-weight: 700; color: #c9a055; margin-bottom: 6px; }
    .login-subtitle { color: #8b8b8b; font-size: 14px; margin-bottom: 32px; }
    
    .login-input {
      width: 100%;
      padding: 14px 18px;
      background: #1a1d24;
      border: 2px solid #c9a055;
      border-radius: 12px;
      color: #ffffff;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
    
    .login-input:focus { outline: none; border-color: #d4af6a; }
    .login-btn { width: 100%; padding: 14px; background: #c9a055; border: none; border-radius: 12px; color: #2d3238; font-size: 16px; font-weight: 700; cursor: pointer; }
    .error-message { color: #ff6b6b; font-size: 13px; margin-top: 12px; display: none; }
    
    .header {
      background: #1a1d24;
      padding: 16px 20px;
      text-align: center;
      border-bottom: 1px solid #2d3238;
    }
    
    .header-logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      color: #c9a055;
    }
    
    .header-logo::before { content: '🥩'; font-size: 22px; }
    
    .date-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #1a1d24;
      border-bottom: 1px solid #2d3238;
    }
    
    .date-label { font-size: 16px; font-weight: 600; color: #ffffff; }
    .date-selectors { display: flex; gap: 8px; }
    
    .date-select {
      padding: 8px 16px;
      background: #2d3238;
      border: 1px solid #c9a055;
      border-radius: 8px;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .date-select:focus { outline: none; border-color: #d4af6a; }
    
    .main-card { margin: 20px 16px; padding: 0; position: relative; }
    
    .main-card-inner {
      padding: 28px 24px;
      background: linear-gradient(135deg, #8b3a3a 0%, #6d2e2e 100%);
      border-radius: 24px;
      border: 3px solid #c9a055;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }
    
    .main-card-inner::after {
      content: '💵';
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 80px;
      opacity: 0.15;
      transform: rotate(15deg);
    }
    
    .card-label { font-size: 14px; color: rgba(255, 255, 255, 0.9); margin-bottom: 8px; font-weight: 500; position: relative; z-index: 1; }
    .card-value { font-size: 36px; font-weight: 700; color: #ffffff; margin-bottom: 8px; letter-spacing: -0.5px; position: relative; z-index: 1; }
    .card-change { font-size: 13px; color: rgba(255, 255, 255, 0.9); font-weight: 600; position: relative; z-index: 1; }
    .card-change .green { color: #6dd47e; }
    .card-change .red { color: #ff6b6b; }
    
    .section-header { padding: 12px 16px 0 16px; }
    .section-title { font-size: 15px; font-weight: 700; color: #ffffff; margin-bottom: 10px; }
    .section-divider { height: 2px; background: linear-gradient(to right, #e85d4f 50%, #3a3f47 50%); margin-bottom: 16px; }
    
    .charts-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px 16px 16px;
    }
    
    .pie-chart-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }
    
    .pie-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    
    .pie-center-label { font-size: 10px; color: #8b8b8b; margin-bottom: 2px; }
    .pie-center-value { font-size: 20px; font-weight: 700; color: #ffffff; }
    
    #pieChart { width: 100%; height: 100%; }
    
    .ratio-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .ratio-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .ratio-color {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    
    .ratio-label {
      font-size: 11px;
      color: #ffffff;
      font-weight: 600;
      flex: 1;
    }
    
    .ratio-value {
      font-size: 11px;
      color: #c9a055;
      font-weight: 700;
    }
    
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 16px 20px 16px;
    }
    
    .account-card {
      background: #2d3238;
      border-radius: 12px;
      padding: 12px 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      width: 100%;
    }
    
    /* ✅ 아코디언이 펼쳐지면 2열 전체를 차지 */
    .account-card.expanded,
    .account-card.has-nested-expanded {
      grid-column: 1 / -1 !important;
    }
    
    .account-card:active {
      background: #3a3f47;
    }
    
    .account-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .account-icon {
      width: 32px;
      height: 32px;
      background: rgba(201, 160, 85, 0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .account-icon svg {
      width: 18px;
      height: 18px;
      stroke: #c9a055;
    }
    
    .account-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .account-label {
      font-size: 11px;
      color: #b8bec7;
      font-weight: 700;
    }
    
    .account-value {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    
    .account-value.positive { color: #3b82f6; }
    .account-value.negative { color: #ef4444; }
    
    .account-chevron {
      width: 20px;
      height: 20px;
      color: #6b7280;
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    
    .account-card.expanded .account-chevron {
      transform: rotate(180deg);
    }
    
    .account-details {
      flex-direction: column;
      display: flex;
      width: 100%;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-top: 0;
    }
    
    .account-details.expanded {
      max-height: 1000px;
      margin-top: 12px;
    }
    
    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 6px;
      margin-bottom: 4px;
      width: 100%;
      box-sizing: border-box;
    }
      width: 100%;
    }
    
    .detail-item:last-child {
      margin-bottom: 0;
    }
    
    .detail-label {
      font-size: 11px;
      color: #b8bec7;
      font-weight: 700;
    }
    
    .detail-value {
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    
    .detail-value.positive { color: #3b82f6; }
    .detail-value.negative { color: #ef4444; }
    
    /* 2단계 아코디언 스타일 */
    .detail-item-nested {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      margin-bottom: 4px;
      width: 100%;
      box-sizing: border-box;
      cursor: pointer;
      padding: 8px 10px;
    }
    
    .detail-item-nested .account-chevron {
      transition: transform 0.3s ease;
    }
    
    .detail-item-nested.expanded .account-chevron {
      transform: rotate(180deg);
    }
    
    .sub-details {
      display: flex;
      flex-direction: column;
      width: 100%;
      padding-left: 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      margin-top: 0;
    }
    
    .sub-details.expanded {
      max-height: 300px;
      margin-top: 8px;
    }
    
    .sub-detail-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      margin-bottom: 4px;
    }
    
    .sub-detail-item:last-child {
      margin-bottom: 0;
    }
    
    .hidden { display: none !important; }
  </style>
</head>

    document.addEventListener('DOMContentLoaded', init);
    
    let calcInterval;
    function startLoadingAnimation() {
      const screen = document.querySelector('.calc-screen');
      const buttons = document.querySelectorAll('.calc-btn');
      
      calcInterval = setInterval(() => {
        const randomNum = Math.floor(Math.random() * 90000) + 10000;
        screen.textContent = randomNum.toLocaleString();
        
        const randomBtn = buttons[Math.floor(Math.random() * buttons.length)];
        randomBtn.classList.add('active');
        setTimeout(() => randomBtn.classList.remove('active'), 300);
      }, 500);
    }
    
    function stopLoadingAnimation() {
      if (calcInterval) clearInterval(calcInterval);
    }
    
    function init() {
      startLoadingAnimation();
      
      const savedPassword = localStorage.getItem('jangsuhan_baekseok_password');
      if (savedPassword) { 
        APP_STATE.password = savedPassword; 
        showMainApp(); 
      } else { 
        showLogin(); 
      }
      
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
      document.getElementById('passwordInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
      
      initDatePickers();
    }

    function showLogin() { 
      stopLoadingAnimation();
      document.getElementById('loadingScreen').style.display = 'none'; 
      document.getElementById('loginContainer').style.display = 'flex'; 
    }
    
    function showMainApp() { 
      document.getElementById('loadingScreen').style.display = 'none'; 
      document.getElementById('loginContainer').style.display = 'none'; 
      document.getElementById('mainApp').classList.remove('hidden'); 
      loadAllData(); 
    }
    
    async function handleLogin() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === '940216') {
        APP_STATE.password = pw;
        localStorage.setItem('jangsuhan_baekseok_password', pw);
        showMainApp();
      } else {
        document.getElementById('errorMessage').style.display = 'block';
        document.getElementById('passwordInput').value = '';
      }
    }

    function initDatePickers() {
      const yp = document.getElementById('yearPicker');
      const mp = document.getElementById('monthPicker');
      
      for (let y = 2025; y <= 2027; y++) { 
        yp.innerHTML += `<option value="${y}" ${y === 2026 ? 'selected' : ''}>${y}년</option>`; 
      }
      for (let m = 1; m <= 12; m++) { 
        mp.innerHTML += `<option value="${m}" ${m === 4 ? 'selected' : ''}>${m}월</option>`; 
      }
      
      yp.onchange = (e) => { APP_STATE.currentYear = parseInt(e.target.value); loadAllData(); };
      mp.onchange = (e) => { APP_STATE.currentMonth = parseInt(e.target.value); loadAllData(); };
    }

    async function loadAllData() {
      document.getElementById('loadingScreen').style.display = 'flex';
      startLoadingAnimation();
      
      try {
        const currentPromise = loadMonthData(APP_STATE.currentYear, APP_STATE.currentMonth);
        const prevMonth = APP_STATE.currentMonth === 1 ? 12 : APP_STATE.currentMonth - 1;
        const prevYear = APP_STATE.currentMonth === 1 ? APP_STATE.currentYear - 1 : APP_STATE.currentYear;
        const prevPromise = loadMonthData(prevYear, prevMonth);
        
        const [current, prev] = await Promise.all([currentPromise, prevPromise]);
        
        APP_STATE.data = current;
        APP_STATE.prevData = prev;
        
        renderUI();
      } catch (e) {
        alert('서버 연결 실패: ' + e.message);
      } finally {
        stopLoadingAnimation();
        document.getElementById('loadingScreen').style.display = 'none';
      }
    }

    async function loadMonthData(year, month) {
      const url = `${APP_CONFIG.API_ENDPOINT}?token=${APP_STATE.password}&branch=${APP_CONFIG.BRANCH}&year=${year}&month=${month}&action=getProfitLoss`;
      const res = await fetch(url);
      const result = await res.json();
      
      if (result.success) {
        return parsePnlData(result.pnlData, result.latestDay);
      }
      return null;
    }

    /**
     * 🆕 새 계정 구조 파싱 함수
     */
    function parsePnlData(pnlData, latestDay) {
      const map = {};
      pnlData.forEach(item => { 
        const cleanKey = item.label.replace(/\s/g, "").replace(/[0-9.%]/g, "");
        map[cleanKey] = item.value; 
      });
      
      const getV = (k) => {
        const target = k.replace(/\s/g, "").replace(/[()]/g, "");
        if (map[target] !== undefined) return map[target];
        const foundKey = Object.keys(map).find(key => 
          key.includes(target) || target.includes(key) || 
          key.replace(/[()&,]/g, "").includes(target.replace(/[()&,]/g, ""))
        );
        return foundKey ? map[foundKey] : 0;
      };

      return {
        // 매출액
        revenue: { 
          total: getV('매출액'),
          items: {
            '현금매출': getV('현금매출'),
            '카드매출': getV('카드매출'),
            '배달매출': getV('배달매출')
          }
        },
        
        // 매출원가 (중분류 포함)
        cogs: { 
          total: getV('매출원가'),
          items: {
            '육류원가': {
              total: getV('육류원가'),
              items: {
                '고기값': getV('고기값')
              }
            },
            '식자재&공산품': {
              total: getV('식자재&공산품') || getV('식자재공산품'),
              items: {
                '미락': getV('미락'),
                '콩나물': getV('콩나물'),
                '가게카드': getV('가게카드네이버쿠팡특양') || getV('가게카드'),
                '키위': getV('키위본성') || getV('키위'),
                '가게내부카드': getV('가게내부카드'),
                '가게외부카드': getV('가게외부카드')
              }
            },
            '주류원가': getV('주류원가'),
            '음료원가': getV('음료원가')
          }
        },
        
        // 매출이익
        grossProfit: getV('매출이익'),
        
        // 인건비
        laborCost: { 
          total: getV('인건비'),
          items: {
            '직원 급여': getV('직원급여') || getV('직원'),
            '알바 급여': getV('알바급여') || getV('알바')
          }
        },
        
        // 임대료
        rent: getV('임대료'),
        
        // 고정비
        fixedCost: { 
          total: getV('고정비'),
          items: {
            '화재보험': getV('화재보험'),
            '정수기렌탈': getV('정수기렌탈') || getV('정수기'),
            'KT통신요금': getV('KT통신요금') || getV('통신요금'),

    function renderUI() {
      const d = APP_STATE.data;
      console.log("🔍 renderUI 시작", d);
      if (!d) {
        console.error("❌ 데이터 없음!");
        return;
      }
      
      const d = APP_STATE.data;
      if (!d) return;
      
      // 메인 카드
      document.getElementById('mainValue').textContent = formatCurrency(d.netProfit);
      
      // 전월 대비
      if (APP_STATE.prevData && APP_STATE.prevData.netProfit) {
        const change = ((d.netProfit - APP_STATE.prevData.netProfit) / APP_STATE.prevData.netProfit * 100).toFixed(1);
        const arrow = change >= 0 ? '▲' : '▼';
        const sign = change >= 0 ? '+' : '';
        const className = change >= 0 ? 'green' : 'red';
        document.getElementById('changePercent').innerHTML = `${arrow} ${sign}${change}%`;
        document.getElementById('changePercent').className = className;
      }
      
      // 파이 차트
      renderPieChart(d);
      
      // 비율 분석 리스트
      renderRatioList(d);
      
      // 계정 그리드
      renderAccounts(d);
    }

    function renderPieChart(d) {
      const canvas = document.getElementById('pieChart');
      const ctx = canvas.getContext('2d');
      const centerX = 70;
      const centerY = 70;
      const radius = 60;
      const innerRadius = 45;
      
      const revenue = d.revenue.total || 1;
      
      // 순이익 + 비용 항목
      const segments = [
        { label: '순이익', value: d.netProfit, color: '#00D9FF' },
        { label: '육류원가', value: d.cogs.items['육류원가'].total, color: '#e85d4f' },
        { label: '식자재&공산품', value: d.cogs.items['식자재&공산품'].total, color: '#c9a055' },
        { label: '주류원가', value: d.cogs.items['주류원가'], color: '#9b7ebd' },
        { label: '음료원가', value: d.cogs.items['음료원가'], color: '#70ad47' },
        { label: '인건비', value: d.laborCost.total, color: '#f7931e' },
        { label: '임대료', value: d.rent, color: '#8b8b8b' },
        { label: '고정비', value: d.fixedCost.total, color: '#6b7280' },
        { label: '변동비', value: d.variableCost.total, color: '#5a6268' }
      ];
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      let startAngle = -Math.PI / 2;
      
      segments.forEach(seg => {
        if (seg.value > 0) {
          const sliceAngle = (seg.value / revenue) * 2 * Math.PI;
          
          ctx.beginPath();
          ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
          ctx.arc(centerX, centerY, innerRadius, startAngle + sliceAngle, startAngle, true);
          ctx.closePath();
          ctx.fillStyle = seg.color;
          ctx.fill();
          ctx.strokeStyle = '#2d3238';
          ctx.lineWidth = 2;
          ctx.stroke();
          
          startAngle += sliceAngle;
        }
      });
      
      const profitPercent = (d.netProfit / revenue * 100).toFixed(1);
      document.getElementById('pieCenterValue').textContent = profitPercent + '%';
    }

    function renderRatioList(d) {
      const container = document.getElementById('ratioList');
      const revenue = d.revenue.total || 1;
      
      const ratios = [
        { label: '순이익', value: d.netProfit, color: '#00D9FF' },
        { label: '육류원가', value: d.cogs.items['육류원가'].total, color: '#e85d4f' },
        { label: '식자재', value: d.cogs.items['식자재&공산품'].total, color: '#c9a055' },
        { label: '주류원가', value: d.cogs.items['주류원가'], color: '#9b7ebd' },
        { label: '음료원가', value: d.cogs.items['음료원가'], color: '#70ad47' },
        { label: '인건비', value: d.laborCost.total, color: '#f7931e' },
        { label: '임대료', value: d.rent, color: '#8b8b8b' },
        { label: '고정비', value: d.fixedCost.total, color: '#6b7280' },
        { label: '변동비', value: d.variableCost.total, color: '#5a6268' }
      ].map(r => ({
        ...r,
        percent: (r.value / revenue * 100).toFixed(1)
      })).sort((a, b) => b.percent - a.percent);
      
      container.innerHTML = ratios.map(r => `
        <div class="ratio-item">
          <div class="ratio-color" style="background: ${r.color};"></div>
          <div class="ratio-label">${r.label}</div>
          <div class="ratio-value">${r.percent}%</div>
        </div>
      `).join('');
    }

            { label: '정수기렌탈', value: d.fixedCost.water },
            { label: 'KT통신요금', value: d.fixedCost.kt },
            { label: '세무사비용', value: d.fixedCost.tax }
          ]
        },
        { 
          icon: ICONS.variable, label: '변동비', value: d.variableCost.total, negative: true, 
          items: [
            { label: '카드수수료', value: d.variableCost.cardFee },
            { label: '매장관리비', value: d.variableCost.management },
            { label: '가스사용료', value: d.variableCost.gas },
            { label: '네이버광고', value: d.variableCost.naver },
            { label: '기타잡비용', value: d.variableCost.misc }
          ]
        },
        { icon: ICONS.operating, label: '영업이익', value: d.operatingProfit, positive: true },
        { 
          icon: ICONS.tax, label: '세금예수금', value: d.taxReserve.total, negative: true, 
          items: [
            { label: '부가세', value: d.taxReserve.vat },
            { label: '종소세', value: d.taxReserve.income }
          ]
        },
        { icon: ICONS.net, label: '매출 순 이익', value: d.netProfit, positive: true }
      ];
      
      container.innerHTML = accounts.map((acc, idx) => {
        const hasItems = acc.items && acc.items.length > 0;
        const valueClass = acc.positive ? 'positive' : (acc.negative ? 'negative' : '');
        const cardId = `account-${idx}`;
        
        return `
          <div class="account-card" id="${cardId}" data-clickable="${hasItems}">
            <div class="account-header">
              <div class="account-icon">${acc.icon}</div>
              <div class="account-main">
                <div class="account-label">${acc.label}</div>
                <div class="account-value ${valueClass}">${formatCurrency(acc.value)}</div>
              </div>
              ${hasItems ? `<div class="account-chevron">${ICONS.chevron}</div>` : ''}
            </div>
            ${hasItems ? `
              <div class="account-details">
                ${acc.items.map((item, itemIdx) => {
                  const itemId = `${cardId}-item-${itemIdx}`;
                  
                  if (item.hasSubItems && item.subItems && item.subItems.length > 0) {
                    // 2단계 아코디언 (육류원가, 식자재&공산품)
                    return `
                      <div class="detail-item detail-item-nested" id="${itemId}" data-sub-clickable="true">
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                          <div style="display: flex; align-items: center; gap: 6px; flex: 1;">
                            <div class="account-chevron" style="width: 16px; height: 16px;">${ICONS.chevron}</div>
                            <div class="detail-label">${item.label}</div>
                          </div>
                          <div class="detail-value ${valueClass}">${formatCurrency(item.value)}</div>
                        </div>
                        <div class="sub-details">
                          ${item.subItems.map(sub => `
                            <div class="sub-detail-item">
                              <div class="detail-label" style="padding-left: 16px;">${sub.label}</div>
                              <div class="detail-value ${valueClass}">${formatCurrency(sub.value)}</div>
                            </div>
                          `).join('')}
                        </div>
                      </div>
                    `;
                  } else {
                    // 일반 항목
                    return `
                      <div class="detail-item">
                        <div class="detail-label">${item.label}</div>
                        <div class="detail-value ${valueClass}">${formatCurrency(item.value)}</div>
                      </div>
                    `;
                  }
                }).join('')}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
      
      console.log('🔧 HTML 설정 완료, 이벤트 리스너 추가 시작');
      
      // ✅ 이벤트 리스너 추가 - 즉시 실행
      const clickableCards = container.querySelectorAll('.account-card[data-clickable="true"]');
      const nestedItems = container.querySelectorAll('.detail-item-nested[data-sub-clickable="true"]');
      
      console.log('🎯 클릭 가능한 카드:', clickableCards.length, '개');
      console.log('🎯 중첩 아이템:', nestedItems.length, '개');
      
      if (clickableCards.length === 0) {
        console.error('❌ 카드를 찾을 수 없습니다!');
        return;
      }
      
      // 대분류 아코디언
      clickableCards.forEach((card, idx) => {
        card.addEventListener('click', function(e) {
          console.log('🖱️ 카드 클릭:', idx);
          
          if (e.target.closest('.detail-item-nested')) return;
          
          const details = this.querySelector('.account-details');
          if (!details) return;
          
          const isExpanded = this.classList.contains('expanded');
          this.classList.toggle('expanded');
          details.classList.toggle('expanded');
          
          console.log('📂', isExpanded ? '닫힘' : '열림');
        });
      });
      
      // 중분류 아코디언
      nestedItems.forEach((item, idx) => {
        item.addEventListener('click', function(e) {
          console.log('🖱️ 중첩 아이템 클릭:', idx);
          e.stopPropagation();
          
          const subDetails = this.querySelector('.sub-details');
          if (!subDetails) return;
          
          const isExpanded = this.classList.contains('expanded');
          this.classList.toggle('expanded');
          subDetails.classList.toggle('expanded');
          
          // ✅ 부모 카드에도 클래스 추가
          const parentCard = this.closest('.account-card');
          if (parentCard) {
            if (!isExpanded) {
              parentCard.classList.add('has-nested-expanded');
            } else {
              const hasOtherExpanded = parentCard.querySelector('.detail-item-nested.expanded:not(#' + this.id + ')');
              if (!hasOtherExpanded) {
                parentCard.classList.remove('has-nested-expanded');
              }
            }
          }
          
          console.log('📂 중첩', isExpanded ? '닫힘' : '열림');
        });
      });
      
      console.log('✅ 이벤트 리스너 추가 완료');
    }

    function toggleAccount(cardId) {
      const card = document.getElementById(cardId);
      const isExpanded = card.classList.contains('expanded');
      const details = card.querySelector('.account-details');
      
      if (isExpanded) {
        card.classList.remove('expanded');
        details.classList.remove('expanded');
      } else {
        card.classList.add('expanded');
        details.classList.add('expanded');
      }
    }

    function toggleSubItem(itemId) {
      const item = document.getElementById(itemId);
      const isExpanded = item.classList.contains('expanded');
      const subDetails = item.querySelector('.sub-details');
      
      if (isExpanded) {
        item.classList.remove('expanded');
        subDetails.classList.remove('expanded');
      } else {
        item.classList.add('expanded');
        subDetails.classList.add('expanded');
      }
    }

    function formatCurrency(n) { 
      return (n || 0).toLocaleString() + '원'; 
    }
  </script>
</body>
</html>
